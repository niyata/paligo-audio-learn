<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ruled Lines Card Only Template</title>
    <style>
      :root {
        --page-bg: #f8f0e3;
        --paper-bg: #fffaf0;
        --paper-border: rgba(74, 44, 10, 0.22);
        --card-bg: rgba(255, 255, 255, 0.78);
        --card-border: rgba(74, 44, 10, 0.16);
        --ink: #3a3a3a;
        --exam-blue: rgba(31, 45, 137, 0.72);
        --rule-color: var(--exam-blue);
        --margin-color: var(--exam-blue);
        --line-height: 26px;
        --line-width: 0.75px;
        --emphasis-line-width: 1px;
        --number-gutter: 5ch;
        --editor-font-size: 14px;
        --header-text-y-offset: 2px;
        --text-y-offset: var(--header-text-y-offset);
        --paper-padding-block: 28px;
        --paper-padding-inline: clamp(22px, 5vw, 56px);
        --paper-padding-inline-end: clamp(8px, 1.4vw, 18px);
        --paper-width: 22cm;
        --lines-first-page: 29;
        --lines-per-page: 33;
        /* First page: 2×edge-blank + emphasis + padding-block = 89px overhead;
           5 non-writing lines (4 header + 1 prefilled) + lines-first-page writing lines */
        --paper-height: calc(
          2 * var(--paper-edge-blank) +
          var(--emphasis-line-width) +
          var(--paper-padding-block) +
          5 * var(--line-height) +
          var(--lines-first-page) * var(--line-height)
        );
        /* Continuation page: no header — emphasis + padding-block + edge-blank = 59px overhead */
        --paper-height-continuation: calc(
          var(--emphasis-line-width) +
          var(--paper-padding-block) +
          var(--paper-edge-blank) +
          var(--lines-per-page) * var(--line-height)
        );
        --paper-edge-blank: 30px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        background: var(--page-bg);
        color: var(--ink);
        font-family: Sarabun, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        line-height: 1.5;
        margin: 0;
        min-height: 100vh;
        padding: clamp(18px, 4vw, 48px);
      }

      .template-shell {
        margin: 0 auto;
        max-width: calc(var(--paper-width) + 46px);
      }

      .template-controls,
      .answer-card {
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        border-radius: 8px;
        box-shadow: 0 18px 46px rgba(74, 44, 10, 0.1);
      }

      .template-controls {
        margin-bottom: 14px;
        padding: 14px 18px;
      }

      .control-grid {
        align-items: center;
        display: grid;
        gap: 10px 12px;
        grid-template-columns: auto minmax(130px, 1fr) auto auto auto auto;
      }

      .control-label,
      .control-value,
      .save-status,
      .pagination-status {
        color: rgba(58, 58, 58, 0.72);
        font-size: 0.86rem;
        font-weight: 700;
      }

      .control-slider {
        accent-color: var(--exam-blue);
        min-width: 0;
        width: 100%;
      }

      .pagination-button,
      .save-button,
      .clear-line-button {
        appearance: none;
        background: var(--paper-bg);
        border: 1px solid var(--paper-border);
        border-radius: 6px;
        color: var(--exam-blue);
        cursor: pointer;
        font: inherit;
        font-size: 0.82rem;
        font-weight: 700;
        min-height: 34px;
        padding: 6px 10px;
      }

      .pagination-button:disabled {
        cursor: default;
        opacity: 0.42;
      }

      .save-status {
        text-align: right;
      }

      .answer-card {
        min-width: 0;
        padding: clamp(14px, 2.4vw, 22px);
      }

      .exam-page-stack {
        display: grid;
        gap: 18px;
      }

      .exam-page {
        background: var(--paper-bg);
        border: 1px solid var(--paper-border);
        border-radius: 8px;
        display: flex;
        flex-direction: column;
        height: var(--paper-height);
        box-shadow:
          inset 0 1px rgba(255, 255, 255, 0.74),
          0 10px 26px rgba(74, 44, 10, 0.08);
        margin: 0 auto;
        overflow: hidden;
        width: min(100%, var(--paper-width));
      }

      .exam-page[hidden] {
        display: none;
      }

      .exam-page.is-first {
        padding-top: var(--paper-edge-blank);
      }

      .exam-page.is-continuation {
        height: var(--paper-height-continuation);
        padding-top: 0;
      }

      /* ── Annotation (ruler / emphasis-line) tool ─────────────────── */
      :root {
        --annotation-line-width: calc(var(--line-width) + 0.4px);
      }

      .exam-page.is-first .ruled-editor-frame {
        --annotation-page-offset: var(--line-height);
      }

      .exam-page.is-continuation .ruled-editor-frame {
        --annotation-page-offset: var(--text-y-offset);
      }

      .annotation-lines {
        bottom: 0;
        left: 0;
        pointer-events: none;
        position: absolute;
        right: 0;
        top: 0;
        z-index: 3;
      }

      .annotation-line {
        background: var(--exam-blue);
        height: var(--annotation-line-width);
        left: calc(var(--paper-padding-inline) + var(--number-gutter));
        pointer-events: none;
        position: absolute;
        right: 0;
        top: calc(
          var(--annotation-page-offset, 0px) +
          var(--line-n, 1) * var(--line-height) -
          var(--annotation-line-width)
        );
        z-index: 3;
      }

      .annotation-canvas {
        bottom: 0;
        cursor: default;
        left: 0;
        pointer-events: none;
        position: absolute;
        right: 0;
        top: 0;
        user-select: none;
        z-index: 5;
      }

      .is-annotating .annotation-canvas {
        cursor: crosshair;
        pointer-events: auto;
      }

      .is-annotating .annotation-canvas:hover {
        background: rgba(31, 45, 137, 0.04);
      }

      .annotation-toggle-button {
        appearance: none;
        background: var(--paper-bg);
        border: 1px solid var(--paper-border);
        border-radius: 6px;
        color: var(--exam-blue);
        cursor: pointer;
        font: inherit;
        min-height: 34px;
        padding: 5px 9px;
        position: relative;
      }

      .annotation-toggle-button:hover:not(.is-active) {
        background: rgba(31, 45, 137, 0.06);
      }

      .annotation-toggle-button.is-active {
        background: rgba(31, 45, 137, 0.88);
        border-color: rgba(31, 45, 137, 0.88);
        color: #fff;
      }

      /* Tooltip แจ้งวิธีใช้เครื่องมือตีเส้น — เข้าชุดกับ .number-area-tooltip */
      .annotation-toggle-button::after {
        background: #fff0a8;
        border: 1px solid #e5c400;
        border-radius: 6px;
        bottom: calc(100% + 9px);
        box-shadow: 0 10px 24px rgba(74, 44, 10, 0.16);
        color: #3a3a3a;
        content: "ตีเส้นบรรทัด แตะเพื่อตีเส้น\A แตะซ้ำ เอาเส้นออก";
        font-size: 0.74rem;
        font-weight: 700;
        left: 50%;
        line-height: 1.5;
        opacity: 0;
        padding: 7px 11px;
        pointer-events: none;
        position: absolute;
        text-align: center;
        transform: translateX(-50%) translateY(4px);
        transition: opacity 140ms ease, transform 140ms ease;
        white-space: pre;
        z-index: 300;
      }

      .annotation-toggle-button::before {
        border: 6px solid transparent;
        border-top-color: #e5c400;
        bottom: calc(100% + 3px);
        content: "";
        left: 50%;
        opacity: 0;
        pointer-events: none;
        position: absolute;
        transform: translateX(-50%);
        transition: opacity 140ms ease;
        z-index: 301;
      }

      .annotation-toggle-button:hover::after,
      .annotation-toggle-button:focus-visible::after {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }

      .annotation-toggle-button:hover::before,
      .annotation-toggle-button:focus-visible::before {
        opacity: 1;
      }

      /* ── View-all / print-preview mode ─────────────────────────── */
      .view-all-button {
        appearance: none;
        background: var(--paper-bg);
        border: 1px solid var(--paper-border);
        border-radius: 6px;
        color: var(--exam-blue);
        cursor: pointer;
        font: inherit;
        min-height: 34px;
        padding: 5px 9px;
      }

      .view-all-button:hover:not([aria-pressed="true"]) {
        background: rgba(31, 45, 137, 0.06);
      }

      .view-all-button[aria-pressed="true"] {
        background: rgba(31, 45, 137, 0.1);
        border-color: var(--exam-blue);
      }

      .view-all-icon-compress { display: none; }

      body.is-view-all .view-all-icon-expand { display: none; }
      body.is-view-all .view-all-icon-compress { display: inline-flex; }

      body.is-view-all .exam-page,
      body.is-view-all .exam-page[hidden] {
        display: flex !important;
        height: auto;
        min-height: var(--paper-height);
        overflow: visible;
      }

      body.is-view-all .exam-page.is-continuation,
      body.is-view-all .exam-page.is-continuation[hidden] {
        min-height: var(--paper-height-continuation);
      }

      body.is-view-all .exam-page-stack {
        gap: 32px;
      }

      body.is-view-all .ruled-editor {
        height: auto;
        min-height: 0;
        overflow: visible;
      }

      .exam-header-lines {
        background:
          repeating-linear-gradient(
            to bottom,
            transparent 0 calc(var(--line-height) - var(--line-width)),
            var(--rule-color) calc(var(--line-height) - var(--line-width)) var(--line-height)
          ),
          var(--paper-bg);
        color: var(--exam-blue);
        display: grid;
        font-size: var(--editor-font-size);
        font-weight: 700;
        line-height: var(--line-height);
        min-height: calc(var(--line-height) * 4);
        padding: 0 var(--paper-padding-inline);
        place-items: center;
        position: relative;
        text-align: center;
        z-index: 4;
      }

      .exam-footer-lines {
        background: var(--paper-bg);
        border-top: var(--emphasis-line-width) solid var(--exam-blue);
        min-height: var(--paper-edge-blank);
      }

      .exam-header-line {
        min-height: var(--line-height);
        transform: translateY(var(--header-text-y-offset));
      }

      .exam-date-line {
        align-items: center;
        display: inline-flex;
        gap: 6px;
        justify-content: center;
        min-height: var(--line-height);
        position: relative;
        white-space: nowrap;
        z-index: 10;
      }

      .exam-picker {
        display: inline-flex;
        position: relative;
      }

      .exam-picker-trigger {
        appearance: none;
        background: transparent;
        border: 0;
        color: var(--exam-blue);
        cursor: pointer;
        font: inherit;
        font-weight: 700;
        height: calc(var(--line-height) - 2px);
        line-height: calc(var(--line-height) - 2px);
        padding: 0 2px;
        text-align: center;
      }

      .exam-picker-trigger:focus-visible {
        outline: 1px solid var(--exam-blue);
        outline-offset: 2px;
      }

      .picker-placeholder {
        font-size: 0.64em;
        letter-spacing: 0;
        opacity: 0.72;
      }

      .exam-picker-trigger.has-value .picker-placeholder,
      .picker-value:empty {
        display: none;
      }

      .exam-date-day {
        min-width: 5ch;
      }

      .exam-date-month {
        min-width: 11ch;
      }

      .exam-date-year {
        min-width: 8ch;
      }

      .exam-picker-popover {
        background: var(--paper-bg);
        border: var(--emphasis-line-width) solid var(--exam-blue);
        border-radius: 6px;
        box-shadow: 0 12px 28px rgba(31, 45, 137, 0.18);
        left: 50%;
        min-width: 180px;
        padding: 8px;
        pointer-events: auto;
        position: absolute;
        top: calc(100% + 4px);
        transform: translateX(-50%);
        z-index: 100;
      }

      .exam-picker-title {
        font-size: 0.72rem;
        line-height: 1.2;
        margin-bottom: 6px;
        text-align: center;
      }

      .exam-picker-grid {
        display: grid;
        gap: 4px;
        grid-template-columns: repeat(7, minmax(24px, 1fr));
      }

      .exam-year-grid {
        grid-template-columns: repeat(4, minmax(42px, 1fr));
        max-height: 210px;
        overflow: auto;
      }

      .exam-month-grid {
        grid-template-columns: repeat(2, minmax(90px, 1fr));
      }

      .exam-grade-line {
        align-items: center;
        display: inline-flex;
        gap: 4px;
        justify-content: center;
        min-height: var(--line-height);
        position: relative;
        white-space: nowrap;
        z-index: 12;
      }

      .exam-grade-trigger {
        min-width: 0;
        padding-left: 0;
        text-align: left;
      }

      .exam-grade-grid {
        grid-template-columns: repeat(4, minmax(40px, 1fr));
      }

      .exam-picker-option {
        appearance: none;
        background: transparent;
        border: 1px solid rgba(31, 45, 137, 0.18);
        border-radius: 4px;
        color: var(--exam-blue);
        cursor: pointer;
        font: inherit;
        font-size: 0.78rem;
        font-weight: 700;
        line-height: 1.4;
        min-height: 24px;
        padding: 2px 4px;
      }

      .exam-picker-option:hover,
      .exam-picker-option.is-selected {
        background: rgba(31, 45, 137, 0.1);
      }

      .exam-emphasis-line {
        border-top: var(--emphasis-line-width) solid var(--exam-blue);
        margin: 0;
      }

      .prefilled-answer-line {
        background:
          repeating-linear-gradient(
            to bottom,
            transparent 0 calc(var(--line-height) - var(--line-width)),
            var(--rule-color) calc(var(--line-height) - var(--line-width)) var(--line-height)
          ),
          var(--paper-bg);
        color: var(--exam-blue);
        font-size: var(--editor-font-size);
        font-weight: 700;
        line-height: var(--line-height);
        min-height: var(--line-height);
        padding: 0 var(--paper-padding-inline);
        text-align: center;
        transform: translateY(var(--header-text-y-offset));
      }

      .ruled-editor-frame {
        flex: 1 1 auto;
        min-height: 0;
        position: relative;
        z-index: 1;
      }

      .exam-page.is-continuation .ruled-editor-frame {
        border-top: var(--emphasis-line-width) solid var(--exam-blue);
      }

      .ruled-editor-frame::before {
        background: var(--margin-color);
        bottom: 0;
        content: "";
        left: calc(var(--paper-padding-inline) + var(--number-gutter));
        position: absolute;
        top: 0;
        width: var(--emphasis-line-width);
        z-index: 1;
      }

      .exam-page.is-first .ruled-editor-frame::after {
        background: var(--paper-bg);
        bottom: 0;
        content: "";
        height: calc(var(--line-width) + 1px);
        left: 0;
        pointer-events: none;
        position: absolute;
        right: 0;
        z-index: 2;
      }

      .ruled-editor {
        appearance: none;
        background:
          repeating-linear-gradient(
            to bottom,
            transparent 0 calc(var(--line-height) - var(--line-width)),
            var(--rule-color) calc(var(--line-height) - var(--line-width)) var(--line-height)
          ),
          var(--paper-bg);
        background-attachment: local, scroll;
        background-origin: padding-box, padding-box;
        background-position:
          0 calc(var(--text-y-offset) * -1),
          0 0;
        background-size: 100% var(--line-height), auto;
        border: 0;
        border-radius: 0;
        color: var(--exam-blue);
        display: block;
        font: inherit;
        font-size: var(--editor-font-size);
        font-weight: 400;
        height: 100%;
        line-height: var(--line-height);
        min-height: 0;
        outline: none;
        overflow: hidden;
        padding: var(--paper-padding-block) var(--paper-padding-inline);
        padding-inline: var(--paper-padding-inline) var(--paper-padding-inline-end);
        padding-block:
          var(--text-y-offset)
          calc(var(--paper-padding-block) - var(--text-y-offset));
        resize: none;
        tab-size: 5;
        width: 100%;
      }

      .exam-page.is-continuation .ruled-editor {
        padding-block:
          var(--text-y-offset)
          calc(var(--paper-padding-block) - var(--text-y-offset));
      }

      .ruled-editor.is-after-prefilled {
        padding-block:
          var(--text-y-offset)
          calc(var(--paper-padding-block) - var(--text-y-offset));
      }

      .template-credit {
        color: rgba(58, 58, 58, 0.58);
        font-size: 0.72rem;
        font-weight: 700;
        margin-top: 12px;
        text-align: right;
      }

      .toast-notice {
        background: rgba(255, 250, 240, 0.96);
        border: 1px solid var(--paper-border);
        border-left: 3px solid var(--exam-blue);
        border-radius: 6px;
        bottom: 18px;
        box-shadow: 0 14px 34px rgba(74, 44, 10, 0.16);
        color: var(--exam-blue);
        font-size: 0.86rem;
        font-weight: 700;
        left: 18px;
        max-width: min(340px, calc(100vw - 36px));
        opacity: 0;
        padding: 10px 12px;
        pointer-events: none;
        position: fixed;
        transform: translateY(10px);
        transition:
          opacity 180ms ease,
          transform 180ms ease;
        z-index: 200;
      }

      .toast-notice.is-visible {
        opacity: 1;
        transform: translateY(0);
      }

      .number-area-tooltip {
        background: #fff0a8;
        border: 1px solid #e5c400;
        border-radius: 6px;
        box-shadow: 0 10px 24px rgba(74, 44, 10, 0.16);
        color: #3a3a3a;
        font-size: 0.8rem;
        font-weight: 700;
        line-height: 1.45;
        max-width: min(260px, calc(100vw - 24px));
        opacity: 0;
        padding: 8px 10px;
        pointer-events: none;
        position: fixed;
        transform: translateY(calc(-100% - 6px));
        transition: opacity 140ms ease;
        z-index: 300;
      }

      .number-area-tooltip.is-visible {
        opacity: 1;
      }

      @media (max-width: 640px) {
        :root {
          --line-height: 22px;
          --number-gutter: 4.5ch;
          --editor-font-size: 12px;
          --paper-padding-block: 22px;
          --paper-padding-inline: 30px;
        }

        .control-grid {
          grid-template-columns: 1fr auto;
        }

        .control-slider,
        .pagination-status,
        .save-status {
          grid-column: 1 / -1;
        }

        .save-status {
          text-align: left;
        }
      }
    </style>
  </head>
  <body>
    <main class="template-shell">
      <section class="template-controls" aria-label="แผงควบคุมพื้นที่เขียน">
        <div class="control-grid">
          <label class="control-label" for="line-height-control">ระยะบรรทัด</label>
          <input
            class="control-slider"
            id="line-height-control"
            type="range"
            min="22"
            max="35"
            step="1"
            value="22"
            data-line-height-control
          />
          <output class="control-value" id="line-height-value" for="line-height-control">22px</output>
          <button class="pagination-button" type="button" data-page-prev>ก่อนหน้า</button>
          <output class="pagination-status" data-page-status>หน้า ๑ / ๒</output>
          <button class="pagination-button" type="button" data-page-next>ถัดไป</button>
          <button class="view-all-button" type="button" data-view-all aria-pressed="false" title="เปิดดูทั้งหมด — แสดงเนื้อหาครบทุกบรรทัด เตรียมก่อนปริ้นท์">
            <span class="view-all-icon-expand" aria-hidden="true">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <path d="M1 5V1h4M1 1l4 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M13 9v4H9M13 13l-4-4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
            <span class="view-all-icon-compress" aria-hidden="true">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <path d="M5 1v4H1M5 5L1 1" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M9 13v-4h4M9 9l4 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
          </button>
          <button class="annotation-toggle-button" type="button" data-annotation-toggle aria-label="ตีเส้นบรรทัด แตะเพื่อตีเส้น แตะซ้ำ เอาเส้นออก">
            <svg width="18" height="16" viewBox="0 0 18 16" fill="none" aria-hidden="true">
              <rect x="0.75" y="3" width="16.5" height="7" rx="1.5" stroke="currentColor" stroke-width="1.25"/>
              <line x1="4" y1="5.2" x2="4" y2="7.6" stroke="currentColor" stroke-width="1"/>
              <line x1="7" y1="5.2" x2="7" y2="8.5" stroke="currentColor" stroke-width="1"/>
              <line x1="10" y1="5.2" x2="10" y2="7.6" stroke="currentColor" stroke-width="1"/>
              <line x1="13" y1="5.2" x2="13" y2="8.5" stroke="currentColor" stroke-width="1"/>
              <line x1="1" y1="13.5" x2="17" y2="13.5" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
            </svg>
          </button>
          <button class="clear-line-button" type="button" data-clear-bottom-line>ล้างบรรทัดล่าง</button>
          <button class="save-button" type="button" data-save-draft>บันทึก</button>
          <output class="save-status" data-save-status>Cmd/Ctrl+S เพื่อบันทึก</output>
        </div>
      </section>

      <section class="answer-card" aria-label="การ์ดพื้นที่เขียนคำตอบ">
        <div class="exam-page-stack">

                    <span class="picker-value" data-picker-value></span>

                  </button>
                  <div class="exam-picker-popover" data-picker-popover hidden>
                    <div class="exam-picker-title">พ.ศ.</div>
                    <div class="exam-picker-grid exam-year-grid" data-picker-options></div>

            <div class="ruled-editor-frame">
              <textarea
                class="ruled-editor"
                aria-label="พื้นที่เขียนคำตอบหน้าถัดไป"
                data-auto-indent="numbered-homework"
                data-page-editor="1"
                spellcheck="false"
              ></textarea>
              <div class="annotation-lines" data-annotation-lines aria-hidden="true"></div>
              <div class="annotation-canvas" data-annotation-canvas aria-hidden="true"></div>
            </div>
            <div class="exam-footer-lines" aria-label="ท้ายกระดาษหน้าถัดไป" aria-hidden="true"></div>

    <div class="toast-notice" role="status" aria-live="polite" data-toast-notice></div>
    <div class="number-area-tooltip" role="tooltip" data-number-area-tooltip hidden>
      กด Tab หรือ เริ่มพิมพ์อักขระ สร้างย่อหน้าอัตโนมัติ
    </div>
    <script>
      (() => {
        const storageKey = "ruled-lines-card-only-draft-v1";
        const numberedLinePattern = /^\s*(\d+)(?:[.)])?\s*(.*)$/;
        const numberedLinePrefix = " ".repeat(4);
        const numberedLineGap = " ".repeat(23);
        const wrapSafetyGap = 6;
        const marginTextGapSteps = 1.5;

        const getNumberGutterCh = () => {
          const raw = getComputedStyle(document.documentElement).getPropertyValue("--number-gutter").trim();
          const match = raw.match(/^([\d.]+)\s*ch$/);
          return match ? Number.parseFloat(match[1]) : 5;
        };

        const measureFontContext = (styles) => {
          const canvas = measureFontContext._canvas || (measureFontContext._canvas = document.createElement("canvas"));
          const context = canvas.getContext("2d");
          context.font = `${styles.fontStyle} ${styles.fontVariant} ${styles.fontWeight} ${styles.fontSize} ${styles.fontFamily}`;
          return context;
        };

        // Space-only indent: right of the margin line by marginTextGapSteps character widths (editor font).
        // Gutter position uses frame/body ch (same as CSS --number-gutter on ::before).
        const computeContinuationIndent = (() => {
          let _cacheKey = null;
          let _cached = "";
          return (editor) => {
            const editorStyles = getComputedStyle(editor);
            const frame = editor.closest(".ruled-editor-frame");
            const frameStyles = frame ? getComputedStyle(frame) : getComputedStyle(document.body);
            const gutterCh = getNumberGutterCh();
            const frameCtx = measureFontContext(frameStyles);
            const editorCtx = measureFontContext(editorStyles);
            const gutterPx = gutterCh * frameCtx.measureText("0").width;
            const charStep = editorCtx.measureText("ก").width;
            const targetPx = gutterPx + charStep * marginTextGapSteps;
            const cacheKey = `${editorStyles.fontSize}|${gutterCh}|${targetPx}`;

            if (cacheKey === _cacheKey) return _cached;

            let s = "";
            while (editorCtx.measureText(s + " ").width < targetPx) s += " ";

            _cacheKey = cacheKey;
            _cached = s;
            return s;
          };
        })();
        const minPageCount = 2;
        const maxPageCount = 8;
        let editors = Array.from(document.querySelectorAll('[data-auto-indent="numbered-homework"]'));
        const lineHeightControls = document.querySelectorAll("[data-line-height-control]");
        const lineHeightValue = document.getElementById("line-height-value");
        const examPickers = document.querySelectorAll("[data-exam-picker]");
        const pageStack = document.querySelector(".exam-page-stack");
        let examPages = Array.from(document.querySelectorAll(".exam-page"));
        const pagePrevButton = document.querySelector("[data-page-prev]");
        const pageNextButton = document.querySelector("[data-page-next]");
        const pageStatus = document.querySelector("[data-page-status]");
        const saveButton = document.querySelector("[data-save-draft]");
        const clearBottomLineButton = document.querySelector("[data-clear-bottom-line]");
        const saveStatus = document.querySelector("[data-save-status]");
        const toastNotice = document.querySelector("[data-toast-notice]");
        const answerCard = document.querySelector(".answer-card");
        const annotationToggle = document.querySelector("[data-annotation-toggle]");
        const thaiDigits = new Map([
          ["0", "๐"],
          ["1", "๑"],
          ["2", "๒"],
          ["3", "๓"],
          ["4", "๔"],
          ["5", "๕"],
          ["6", "๖"],
          ["7", "๗"],
          ["8", "๘"],
          ["9", "๙"],
        ]);

        const toThaiNumber = (value) => String(value).replace(/[0-9]/g, (digit) => thaiDigits.get(digit));
        const thaiMonthNames = [
          "มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน",
          "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม",
          "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม",
        ];
        const gradeValues = ["1-2", "3", "4", "5", "6", "7", "8", "9"];
        let currentPageIndex = 0;
        let saveStatusTimer;
        let autoSaveTimer;
        let toastTimer;

        const setSaveStatus = (message) => {
          if (!saveStatus) return;
          saveStatus.value = message;
          clearTimeout(saveStatusTimer);
          saveStatusTimer = setTimeout(() => {
            saveStatus.value = "Cmd/Ctrl+S เพื่อบันทึก";
          }, 2200);
        };

        const showToast = (message) => {
          if (!toastNotice) return;

          toastNotice.textContent = message;
          toastNotice.classList.add("is-visible");
          clearTimeout(toastTimer);
          toastTimer = setTimeout(() => {
            toastNotice.classList.remove("is-visible");
          }, 2800);
        };

        const showPage = (nextPageIndex) => {
          if (!examPages.length) return;

          currentPageIndex = Math.min(Math.max(nextPageIndex, 0), examPages.length - 1);

          examPages.forEach((page, index) => {
            page.hidden = index !== currentPageIndex;
          });

          if (pagePrevButton) pagePrevButton.disabled = currentPageIndex === 0;
          if (pageNextButton) pageNextButton.disabled = currentPageIndex === examPages.length - 1;
          if (pageStatus) {
            pageStatus.value = `หน้า ${toThaiNumber(currentPageIndex + 1)} / ${toThaiNumber(examPages.length)}`;
          }

          balanceCurrentPageLines();
          scheduleAutoSave();
        };

        const createContinuationPage = (pageIndex) => {
          const page = document.createElement("article");
          const frame = document.createElement("div");
          const editor = document.createElement("textarea");
          const footer = document.createElement("div");

          page.className = "exam-page is-continuation";
          page.setAttribute("aria-label", `กระดาษคำตอบหน้าที่ ${pageIndex + 1}`);
          page.hidden = true;

          frame.className = "ruled-editor-frame";
          editor.className = "ruled-editor";
          editor.setAttribute("aria-label", `พื้นที่เขียนคำตอบหน้าที่ ${pageIndex + 1}`);
          editor.dataset.autoIndent = "numbered-homework";
          editor.dataset.pageEditor = String(pageIndex);
          editor.spellcheck = false;

          footer.className = "exam-footer-lines";
          footer.setAttribute("aria-label", `ท้ายกระดาษหน้าที่ ${pageIndex + 1}`);
          footer.setAttribute("aria-hidden", "true");

          const annotationLines = document.createElement("div");
          const annotationCanvas = document.createElement("div");
          annotationLines.className = "annotation-lines";
          annotationLines.setAttribute("data-annotation-lines", "");
          annotationLines.setAttribute("aria-hidden", "true");
          annotationCanvas.className = "annotation-canvas";
          annotationCanvas.setAttribute("data-annotation-canvas", "");
          annotationCanvas.setAttribute("aria-hidden", "true");

          frame.append(editor, annotationLines, annotationCanvas);
          page.append(frame, footer);
          return page;
        };

        const refreshPageCollections = () => {
          examPages = Array.from(document.querySelectorAll(".exam-page"));
          editors = Array.from(document.querySelectorAll('[data-auto-indent="numbered-homework"]'));
        };

        // ── Annotation state ────────────────────────────────────────
        let annotations = []; // [{page: number, line: number (1-based)}]
        let isAnnotating = false;

        const renderAnnotations = () => {
          examPages.forEach((page, pageIndex) => {
            const container = page.querySelector("[data-annotation-lines]");
            if (!container) return;

            container.innerHTML = "";
            annotations
              .filter((a) => a.page === pageIndex)
              .forEach(({ line }) => {
                const el = document.createElement("div");
                el.className = "annotation-line";
                el.style.setProperty("--line-n", String(line));
                container.append(el);
              });
          });
        };

        const bindAnnotationCanvas = (canvas, pageIndex) => {
          if (canvas.dataset.annotationBound === "true") return;
          canvas.dataset.annotationBound = "true";

          canvas.addEventListener("click", (e) => {
            if (!isAnnotating) return;

            const frame = canvas.closest(".ruled-editor-frame");
            const editor = frame?.querySelector(".ruled-editor");
            if (!frame || !editor) return;

            const lineHeight =
              Number.parseFloat(
                getComputedStyle(document.documentElement).getPropertyValue("--line-height").trim()
              ) || 26;
            const frameRect = frame.getBoundingClientRect();
            const editorRect = editor.getBoundingClientRect();
            const relativeY = e.clientY - editorRect.top;
            const lineN = Math.ceil(relativeY / lineHeight);
            const maxLines = pageIndex === 0 ? linesFirstPage : linesPerPage;

            if (lineN < 1 || lineN > maxLines) return;

            const existingIdx = annotations.findIndex(
              (a) => a.page === pageIndex && a.line === lineN
            );
            if (existingIdx >= 0) {
              annotations.splice(existingIdx, 1);
            } else {
              annotations.push({ page: pageIndex, line: lineN });
            }

            renderAnnotations();
            scheduleAutoSave();
          });
        };

        const getEditorVisibleLineCount = (editor) => {
          const styles = getComputedStyle(editor);
          const lineHeight = Number.parseFloat(styles.lineHeight) || Number.parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--line-height")) || 22;
          const paddingTop = Number.parseFloat(styles.paddingTop) || 0;
          const paddingBottom = Number.parseFloat(styles.paddingBottom) || 0;
          // The prefilled-answer-line sits before the editor inside the same frame.
          // editor.clientHeight = full frame height, but the editor starts one lineHeight
          // below the prefilled element, so the visible writing area is reduced by lineHeight.
          const prefilledOffset = editor.classList.contains("is-after-prefilled") ? lineHeight : 0;
          const writableHeight = Math.max(lineHeight, editor.clientHeight - prefilledOffset - paddingTop - paddingBottom);

          return Math.max(1, Math.floor(writableHeight / lineHeight));
        };

        const getCaretLineNumber = (editor) => editor.value.slice(0, editor.selectionStart).split("\n").length;

        const linesFirstPage = parseInt(getComputedStyle(document.documentElement).getPropertyValue("--lines-first-page").trim()) || 29;
        const linesPerPage = parseInt(getComputedStyle(document.documentElement).getPropertyValue("--lines-per-page").trim()) || 33;
        const getMaxLines = (editor) => Number(editor.dataset.pageEditor || 0) === 0 ? linesFirstPage : linesPerPage;

        const numberAreaTooltip = document.querySelector("[data-number-area-tooltip]");

        const getLineContextAtCaret = (editor) => {
          const value = editor.value;
          const pos = editor.selectionStart;
          const lineStart = value.lastIndexOf("\n", pos - 1) + 1;
          const lineEndIndex = value.indexOf("\n", pos);
          const lineEnd = lineEndIndex === -1 ? value.length : lineEndIndex;

          return {
            line: value.slice(lineStart, lineEnd),
            caretInLine: pos - lineStart,
          };
        };

        const isCaretInNumberArea = (editor) => {
          const { line, caretInLine } = getLineContextAtCaret(editor);
          const numbered = line.match(numberedLinePattern);

          if (numbered) {
            const numberEnd = numberedLinePrefix.length + numbered[1].length;
            return caretInLine <= numberEnd;
          }

          const partial = line.slice(0, caretInLine);
          const leading = partial.match(/^(\s*)(\d*)/);
          if (!leading) return false;

          const numberEnd = leading[1].length + leading[2].length;
          return caretInLine <= numberEnd && leading[2].length > 0;
        };

        const positionNumberAreaTooltip = (editor) => {
          if (!numberAreaTooltip) return;

          const styles = getComputedStyle(editor);
          const frame = editor.closest(".ruled-editor-frame");
          const frameStyles = frame ? getComputedStyle(frame) : getComputedStyle(document.body);
          const lineHeight = Number.parseFloat(styles.lineHeight) || 26;
          const paddingTop = Number.parseFloat(styles.paddingTop) || 0;
          const paddingLeft = Number.parseFloat(styles.paddingLeft) || 0;
          const gutterPx = getNumberGutterCh() * measureFontContext(frameStyles).measureText("0").width;
          const rect = editor.getBoundingClientRect();
          const lineNum = getCaretLineNumber(editor);

          numberAreaTooltip.style.top = `${rect.top + paddingTop + (lineNum - 1) * lineHeight}px`;
          numberAreaTooltip.style.left = `${rect.left + paddingLeft + gutterPx + 8}px`;
        };

        const hideNumberAreaTooltip = () => {
          if (!numberAreaTooltip) return;
          numberAreaTooltip.classList.remove("is-visible");
          numberAreaTooltip.hidden = true;
        };

        const jumpToParagraphFromNumberArea = (editor, insertedText = "") => {
          insertAtSelection(editor, computeContinuationIndent(editor) + insertedText);
          hideNumberAreaTooltip();
          // With a typed character the normalizer keeps the line; a bare Tab inserts
          // only indent spaces, which normalizeValue would trimEnd away — so skip the
          // normalizing input dispatch and just sync state, leaving the caret in the paragraph.
          if (insertedText) {
            editor.dispatchEvent(new Event("input", { bubbles: true }));
          } else {
            syncNumberAreaTooltip(editor);
            scheduleAutoSave();
          }
        };

        const syncNumberAreaTooltip = (editor) => {
          if (!numberAreaTooltip) return;

          if (isCaretInNumberArea(editor)) {
            positionNumberAreaTooltip(editor);
            numberAreaTooltip.hidden = false;
            numberAreaTooltip.classList.add("is-visible");
            return;
          }

          hideNumberAreaTooltip();
        };

        const bindNumberAreaTooltip = (editor) => {
          if (editor.dataset.numberTooltipBound === "true") return;
          editor.dataset.numberTooltipBound = "true";

          editor.addEventListener("input", () => syncNumberAreaTooltip(editor));
          editor.addEventListener("keyup", () => syncNumberAreaTooltip(editor));
          editor.addEventListener("click", () => syncNumberAreaTooltip(editor));
          editor.addEventListener("blur", hideNumberAreaTooltip);
        };

        const balanceCurrentPageLines = () => {
          window.requestAnimationFrame(() => {
            const page = examPages[currentPageIndex];
            const editor = editors[currentPageIndex];
            const footer = page?.querySelector(".exam-footer-lines");

            if (!page || !editor || !footer) return;

            footer.style.minHeight = "";

            window.requestAnimationFrame(() => {
              const styles = getComputedStyle(editor);
              const lineHeight = Number.parseFloat(styles.lineHeight) || 22;
              const paddingTop = Number.parseFloat(styles.paddingTop) || 0;
              const paddingBottom = Number.parseFloat(styles.paddingBottom) || 0;
              const writableHeight = Math.max(0, editor.clientHeight - paddingTop - paddingBottom);
              const remainder = writableHeight % lineHeight;
              const adjustment = remainder < 0.5 ? 0 : remainder;

              footer.style.minHeight = `calc(var(--paper-edge-blank) + ${adjustment}px)`;
            });
          });
        };

        const bindEditor = (editor) => {
          if (editor.dataset.editorBound === "true") return;
          editor.dataset.editorBound = "true";

          editor.addEventListener("keydown", (event) => {
            if (event.key === "Enter") {
              event.preventDefault();
              const pageIndex = Number(editor.dataset.pageEditor || 0);
              const caretLine = getCaretLineNumber(editor);
              const maxLines = getMaxLines(editor);

              if (caretLine >= maxLines) {
                if (pageIndex >= examPages.length - 1) ensurePageCount(examPages.length + 1, true);
                showPage(pageIndex + 1);
                const nextEditor = editors[pageIndex + 1];
                if (nextEditor) { nextEditor.focus(); nextEditor.setSelectionRange(0, 0); }
                return;
              }

              insertAtSelection(editor, `\n${computeContinuationIndent(editor)}`);
              maybePrepareNextPage(editor);
              scheduleAutoSave();
            }

            if (event.key === "Tab") {
              event.preventDefault();
              jumpToParagraphFromNumberArea(editor);
              return;
            }

            if (
              isCaretInNumberArea(editor) &&
              event.key.length === 1 &&
              !event.ctrlKey &&
              !event.metaKey &&
              !event.altKey &&
              !/^\d$/.test(event.key)
            ) {
              event.preventDefault();
              jumpToParagraphFromNumberArea(editor, event.key);
            }
          });

          bindNumberAreaTooltip(editor);

          editor.addEventListener("input", () => {
            const before = editor.value;
            const selectionStart = editor.selectionStart;
            const selectionEnd = editor.selectionEnd;
            let after = normalizeValue(before, editor);

            const maxLines = getMaxLines(editor);
            const afterLines = after.split("\n");
            if (afterLines.length > maxLines) after = afterLines.slice(0, maxLines).join("\n");

            if (after !== before) {
              const delta = after.length - before.length;
              editor.value = after;
              editor.setSelectionRange(
                Math.max(0, Math.min(selectionStart + delta, after.length)),
                Math.max(0, Math.min(selectionEnd + delta, after.length))
              );
            }

            maybePrepareNextPage(editor);
            scheduleAutoSave();
            syncNumberAreaTooltip(editor);
          });
        };

        const ensurePageCount = (targetCount, shouldNotify = false) => {
          if (!pageStack) return false;

          const nextCount = Math.min(Math.max(targetCount, minPageCount), maxPageCount);
          let didCreate = false;

          while (examPages.length < nextCount) {
            const page = createContinuationPage(examPages.length);

            pageStack.append(page);
            refreshPageCollections();
            bindEditor(editors[editors.length - 1]);
            const newCanvas = page.querySelector("[data-annotation-canvas]");
            if (newCanvas) bindAnnotationCanvas(newCanvas, examPages.length - 1);
            didCreate = true;
          }

          if (didCreate) {
            showPage(currentPageIndex);
            if (shouldNotify) showToast("สร้างหน้าถัดไปรอแล้วนะ");
            scheduleAutoSave();
          }

          return didCreate;
        };

        const maybePrepareNextPage = (editor) => {
          const pageIndex = Number(editor.dataset.pageEditor || 0);
          const isLatestGeneratedPage = pageIndex === examPages.length - 1;
          const isAtLastLine = getCaretLineNumber(editor) >= getMaxLines(editor);

          if (!isLatestGeneratedPage || !isAtLastLine) return;

          ensurePageCount(examPages.length + 1, true);
        };

        const closePickers = (exceptPicker) => {
          examPickers.forEach((picker) => {
            if (picker === exceptPicker) return;

            const trigger = picker.querySelector(".exam-picker-trigger");
            const popover = picker.querySelector("[data-picker-popover]");

            trigger?.setAttribute("aria-expanded", "false");
            if (popover) popover.hidden = true;
          });
        };

        const selectPickerValue = (picker, value) => {
          const trigger = picker.querySelector(".exam-picker-trigger");
          const valueDisplay = picker.querySelector("[data-picker-value]");
          const popover = picker.querySelector("[data-picker-popover]");
          const options = picker.querySelector("[data-picker-options]");

          if (!trigger || !valueDisplay || !popover || !options) return;

          picker.dataset.value = String(value);
          const isMonthPicker = picker.dataset.examPicker === "month";
          valueDisplay.textContent = isMonthPicker ? thaiMonthNames[Number(value) - 1] : toThaiNumber(value);
          trigger.classList.add("has-value");
          trigger.setAttribute("aria-expanded", "false");
          popover.hidden = true;
          options.querySelectorAll(".exam-picker-option").forEach((item) => {
            item.classList.toggle("is-selected", item.dataset.value === String(value));
          });
        };

        examPickers.forEach((picker) => {
          const currentBuddhistYear = new Date().getFullYear() + 543;
          const yearWindow = Number(picker.dataset.yearWindow || 0);
          const isMonthPicker = picker.dataset.examPicker === "month";
          const isGradePicker = picker.dataset.examPicker === "grade";
          const trigger = picker.querySelector(".exam-picker-trigger");
          const popover = picker.querySelector("[data-picker-popover]");
          const options = picker.querySelector("[data-picker-options]");

          if (!trigger || !popover || !options) return;

          let optionValues;
          if (isGradePicker) {
            optionValues = gradeValues.slice();
          } else {
            const min = isMonthPicker ? 1 : (yearWindow ? currentBuddhistYear : Number(picker.dataset.min));
            const max = isMonthPicker ? 12 : (yearWindow ? currentBuddhistYear + yearWindow - 1 : Number(picker.dataset.max));
            optionValues = [];
            for (let value = min; value <= max; value += 1) optionValues.push(value);
          }

          optionValues.forEach((value) => {
            const option = document.createElement("button");

            option.className = "exam-picker-option";
            option.type = "button";
            option.textContent = isMonthPicker ? thaiMonthNames[value - 1] : toThaiNumber(value);
            option.dataset.value = String(value);
            option.addEventListener("click", (event) => {
              event.stopPropagation();
              selectPickerValue(picker, value);
              scheduleAutoSave();
            });
            options.append(option);
          });

          if (picker.dataset.default) selectPickerValue(picker, picker.dataset.default);

          trigger.addEventListener("click", (event) => {
            event.stopPropagation();
            const willOpen = popover.hidden;

            closePickers(picker);
            popover.hidden = !willOpen;
            trigger.setAttribute("aria-expanded", String(willOpen));
            if (willOpen) options.querySelector(".exam-picker-option")?.focus();
          });

          picker.addEventListener("click", (event) => {
            event.stopPropagation();
          });
        });

        document.addEventListener("click", (event) => {
          if (!(event.target instanceof Element)) return;
          if (event.target.closest("[data-exam-picker]")) return;

          closePickers();
        });

        document.addEventListener("keydown", (event) => {
          if (event.key === "Escape") closePickers();
        });

        const normalizeLine = (line, indent) => {
          if (!line.trim()) return "";

          const numbered = line.match(numberedLinePattern);
          if (numbered) return `${numberedLinePrefix}${numbered[1]}${numberedLineGap}${numbered[2].trimStart()}`;

          return `${indent}${line.replace(/^\s+/, "")}`;
        };

        const createMeasureContext = (editor) => {
          const canvas = createMeasureContext.canvas || document.createElement("canvas");
          const context = canvas.getContext("2d");
          const styles = getComputedStyle(editor);

          createMeasureContext.canvas = canvas;
          context.font = `${styles.fontStyle} ${styles.fontVariant} ${styles.fontWeight} ${styles.fontSize} ${styles.fontFamily}`;
          return context;
        };

        const getWritableWidth = (editor) => {
          const styles = getComputedStyle(editor);
          const paddingLeft = Number.parseFloat(styles.paddingLeft) || 0;
          const paddingRight = Number.parseFloat(styles.paddingRight) || 0;

          return Math.max(40, editor.clientWidth - paddingLeft - paddingRight - wrapSafetyGap);
        };

        const wrapLineToEditor = (line, editor, indent) => {
          if (!line.trim()) return [""];

          const context = createMeasureContext(editor);
          const writableWidth = getWritableWidth(editor);
          const wrapped = [];
          let current = "";

          Array.from(line).forEach((char) => {
            const candidate = `${current}${char}`;

            if (current && context.measureText(candidate).width > writableWidth) {
              wrapped.push(current.trimEnd());
              current = `${indent}${char}`;
              return;
            }

            current = candidate;
          });

          wrapped.push(current.trimEnd());
          return wrapped;
        };

        const normalizeValue = (value, editor) => {
          const indent = computeContinuationIndent(editor);
          return value
            .split("\n")
            .map((line) => normalizeLine(line, indent))
            .flatMap((line) => wrapLineToEditor(line, editor, indent))
            .join("\n");
        };

        const insertAtSelection = (editor, text) => {
          const start = editor.selectionStart;
          const end = editor.selectionEnd;

          editor.value = `${editor.value.slice(0, start)}${text}${editor.value.slice(end)}`;
          editor.setSelectionRange(start + text.length, start + text.length);
        };

        editors.forEach(bindEditor);

        const applyLineHeight = (lineHeight) => {
          const fontSize = Math.round(lineHeight * 0.54);

          document.documentElement.style.setProperty("--line-height", `${lineHeight}px`);
          document.documentElement.style.setProperty("--editor-font-size", `${fontSize}px`);
          if (lineHeightValue) lineHeightValue.value = `${lineHeight}px`;
          balanceCurrentPageLines();
        };

        const saveDraft = ({ silent = false } = {}) => {
          const draft = {
            lineHeight: lineHeightControls[0]?.value || "22",
            page: currentPageIndex,
            pickers: Array.from(examPickers).map((picker) => ({
              type: picker.dataset.examPicker,
              value: picker.dataset.value || "",
            })),
            pages: editors.map((editor) => editor.value),
            annotations: annotations.slice(),
            savedAt: new Date().toISOString(),
          };

          localStorage.setItem(storageKey, JSON.stringify(draft));
          if (!silent) setSaveStatus("บันทึกแล้ว");
        };

        const scheduleAutoSave = () => {
          clearTimeout(autoSaveTimer);
          autoSaveTimer = setTimeout(() => {
            saveDraft({ silent: true });
          }, 650);
        };

        const clearBottomLine = () => {
          const editor = editors[currentPageIndex];
          if (!editor) return;

          const lines = editor.value.split("\n");
          let targetIndex = lines.length - 1;

          while (targetIndex >= 0 && !lines[targetIndex].trim()) targetIndex -= 1;
          if (targetIndex < 0) return;

          lines.splice(targetIndex, 1);
          editor.value = lines.join("\n");
          editor.focus();
          editor.setSelectionRange(editor.value.length, editor.value.length);
          scheduleAutoSave();
        };

        const restoreDraft = () => {
          const raw = localStorage.getItem(storageKey);
          if (!raw) return false;

          try {
            const draft = JSON.parse(raw);
            const lineHeight = Number(draft.lineHeight || 22);

            lineHeightControls.forEach((control) => {
              control.value = String(lineHeight);
            });
            applyLineHeight(lineHeight);

            ensurePageCount(draft.pages?.length || minPageCount);

            draft.pages?.forEach((value, index) => {
              if (editors[index]) editors[index].value = value;
            });

            draft.pickers?.forEach(({ type, value }) => {
              if (!value) return;
              const picker = Array.from(examPickers).find((item) => item.dataset.examPicker === type);
              if (picker) selectPickerValue(picker, value);
            });

            annotations = Array.isArray(draft.annotations) ? draft.annotations : [];
            renderAnnotations();

            showPage(Number(draft.page || 0));
            setSaveStatus("กู้คืนร่างแล้ว");
            return true;
          } catch {
            setSaveStatus("กู้คืนร่างไม่ได้");
            return false;
          }
        };

        annotationToggle?.addEventListener("click", () => {
          isAnnotating = !isAnnotating;
          answerCard?.classList.toggle("is-annotating", isAnnotating);
          annotationToggle.classList.toggle("is-active", isAnnotating);
        });

        const viewAllButton = document.querySelector("[data-view-all]");
        viewAllButton?.addEventListener("click", () => {
          const isNowActive = document.body.classList.toggle("is-view-all");
          viewAllButton.setAttribute("aria-pressed", String(isNowActive));
          viewAllButton.setAttribute(
            "title",
            isNowActive
              ? "ปิดดูทั้งหมด — กลับโหมดแก้ไขปกติ"
              : "เปิดดูทั้งหมด — แสดงเนื้อหาครบทุกบรรทัด เตรียมก่อนปริ้นท์"
          );
        });

        examPages.forEach((page, pageIndex) => {
          const canvas = page.querySelector("[data-annotation-canvas]");
          if (canvas) bindAnnotationCanvas(canvas, pageIndex);
        });

        pagePrevButton?.addEventListener("click", () => showPage(currentPageIndex - 1));
        pageNextButton?.addEventListener("click", () => showPage(currentPageIndex + 1));
        saveButton?.addEventListener("click", saveDraft);
        clearBottomLineButton?.addEventListener("click", clearBottomLine);

        document.addEventListener("keydown", (event) => {
          const usesModifier = event.metaKey || event.ctrlKey;

          if (usesModifier && event.key.toLowerCase() === "s") {
            event.preventDefault();
            saveDraft();
          }

          if (usesModifier && event.key === "ArrowLeft") {
            event.preventDefault();
            showPage(currentPageIndex - 1);
          }

          if (usesModifier && event.key === "ArrowRight") {
            event.preventDefault();
            showPage(currentPageIndex + 1);
          }
        });

        lineHeightControls.forEach((control) => {
          const responsiveDefault = parseInt(getComputedStyle(document.documentElement).getPropertyValue("--line-height").trim()) || 26;
          control.value = String(responsiveDefault);
          control.addEventListener("input", () => {
            applyLineHeight(Number(control.value));
            scheduleAutoSave();
          });
          applyLineHeight(Number(control.value));
        });

        showPage(0);
        restoreDraft();
      })();
    </script>
  </body>
</html>
