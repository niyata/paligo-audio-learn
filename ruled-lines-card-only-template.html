<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ruled Lines Card Only Template</title>
    <style>
      :root {
        --page-bg: #f8f0e3;
        --paper-bg: #fffaf0;
        --paper-border: rgba(74, 44, 10, 0.22);
        --card-bg: rgba(255, 255, 255, 0.78);
        --card-border: rgba(74, 44, 10, 0.16);
        --ink: #3a3a3a;
        --rule-color: rgba(212, 175, 55, 0.42);
        --margin-color: rgba(184, 92, 92, 0.42);
        --line-height: 22px;
        --line-width: 1px;
        --number-gutter: 5ch;
        --editor-font-size: 12px;
        --text-y-offset: 2px;
        --paper-padding-block: 28px;
        --paper-padding-inline: clamp(22px, 5vw, 56px);
        --paper-min-height: 420px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        background: var(--page-bg);
        color: var(--ink);
        font-family: Sarabun, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        line-height: 1.5;
        margin: 0;
        min-height: 100vh;
        padding: clamp(18px, 4vw, 48px);
      }

      .template-shell {
        margin: 0 auto;
        max-width: 860px;
      }

      .template-controls,
      .answer-card {
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        border-radius: 8px;
        box-shadow: 0 18px 46px rgba(74, 44, 10, 0.1);
      }

      .template-controls {
        margin-bottom: 14px;
        padding: 14px 18px;
      }

      .control-row {
        align-items: center;
        display: grid;
        gap: 10px;
        grid-template-columns: auto 1fr auto;
      }

      .control-label,
      .control-value {
        color: rgba(58, 58, 58, 0.72);
        font-size: 0.86rem;
        font-weight: 700;
      }

      .control-slider {
        accent-color: #d4af37;
        min-width: 0;
        width: 100%;
      }

      .answer-card {
        min-width: 0;
        padding: clamp(14px, 2.4vw, 22px);
      }

      .paper-header,
      .paper-footer {
        display: grid;
        gap: 10px 14px;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        margin: 0 0 12px;
      }

      .paper-footer {
        margin: 12px 0 0;
      }

      .paper-field {
        align-items: end;
        color: rgba(58, 58, 58, 0.68);
        display: grid;
        font-size: 0.78rem;
        font-weight: 700;
        gap: 4px;
        grid-template-columns: auto minmax(42px, 1fr);
        min-width: 0;
      }

      .paper-field.is-wide {
        grid-column: span 2;
      }

      .paper-line {
        border-bottom: 1px dotted rgba(74, 44, 10, 0.32);
        display: block;
        height: 1.15em;
        min-width: 0;
      }

      .template-credit {
        color: rgba(58, 58, 58, 0.58);
        font-size: 0.72rem;
        font-weight: 700;
        margin-top: 12px;
        text-align: right;
      }

      .ruled-editor {
        appearance: none;
        background:
          linear-gradient(
            90deg,
            transparent 0 var(--number-gutter),
            var(--margin-color) var(--number-gutter) calc(var(--number-gutter) + 1px),
            transparent calc(var(--number-gutter) + 1px)
          ),
          repeating-linear-gradient(
            to bottom,
            transparent 0 calc(var(--line-height) - var(--line-width)),
            var(--rule-color) calc(var(--line-height) - var(--line-width)) var(--line-height)
          ),
          var(--paper-bg);
        background-origin: content-box, padding-box, padding-box;
        background-size: 100% 100%, 100% var(--line-height), auto;
        background-attachment: local, local, scroll;
        background-position:
          0 calc(var(--text-y-offset) * -1),
          0 calc(var(--text-y-offset) * -1),
          0 0;
        border: 1px solid var(--paper-border);
        border-radius: 8px;
        box-shadow:
          inset 0 1px rgba(255, 255, 255, 0.74),
          0 10px 26px rgba(74, 44, 10, 0.08);
        color: var(--ink);
        display: block;
        font: inherit;
        font-size: var(--editor-font-size);
        line-height: var(--line-height);
        min-height: var(--paper-min-height);
        outline: none;
        overflow: auto;
        padding: var(--paper-padding-block) var(--paper-padding-inline);
        padding-block:
          calc(var(--paper-padding-block) + var(--text-y-offset))
          calc(var(--paper-padding-block) - var(--text-y-offset));
        resize: vertical;
        tab-size: 5;
        width: 100%;
      }

      @media (max-width: 640px) {
        :root {
          --line-height: 22px;
          --number-gutter: 4.5ch;
          --editor-font-size: 12px;
          --paper-padding-block: 22px;
          --paper-padding-inline: 30px;
          --paper-min-height: 360px;
        }

        .control-row {
          grid-template-columns: 1fr auto;
        }

        .control-slider {
          grid-column: 1 / -1;
        }

        .paper-header,
        .paper-footer {
          grid-template-columns: 1fr 1fr;
        }

        .paper-field.is-wide {
          grid-column: span 2;
        }
      }
    </style>
  </head>
  <body>
    <main class="template-shell">
      <section class="template-controls" aria-label="แผงควบคุมพื้นที่เขียน">
        <div class="control-row">
          <label class="control-label" for="line-height-control">ระยะบรรทัด</label>
          <input
            class="control-slider"
            id="line-height-control"
            type="range"
            min="22"
            max="35"
            step="1"
            value="22"
            data-line-height-control
          />
          <output class="control-value" id="line-height-value" for="line-height-control">22px</output>
        </div>
      </section>

      <section class="answer-card" aria-label="การ์ดพื้นที่เขียนคำตอบ">
        <div class="paper-header" aria-label="หัวกระดาษ">
          <label class="paper-field is-wide">ชื่อ-สกุล <span class="paper-line"></span></label>
          <label class="paper-field">ชั้น <span class="paper-line"></span></label>
          <label class="paper-field">เลขที่ <span class="paper-line"></span></label>
          <label class="paper-field">วิชา <span class="paper-line"></span></label>
          <label class="paper-field">วันที่ <span class="paper-line"></span></label>
          <label class="paper-field is-wide">เรื่อง <span class="paper-line"></span></label>
        </div>

        <textarea
          class="ruled-editor"
          aria-label="พื้นที่เขียนพร้อมเส้นบรรทัด"
          data-auto-indent="numbered-homework"
          spellcheck="false"
        ></textarea>

        <div class="paper-footer" aria-label="หางกระดาษ">
          <label class="paper-field is-wide">ผู้ส่งงาน <span class="paper-line"></span></label>
          <label class="paper-field is-wide">ผู้ตรวจ <span class="paper-line"></span></label>
          <label class="paper-field">คะแนน <span class="paper-line"></span></label>
          <label class="paper-field">วันที่ตรวจ <span class="paper-line"></span></label>
        </div>
        <div class="template-credit">Ruled paper template by niyatajayo · v1.0.0 · 2026-07-01</div>
      </section>
    </main>
    <script>
      (() => {
        const numberedLinePattern = /^\s*(\d+)(?:[.)])?\s*(.*)$/;
        const numberedLineGap = " ".repeat(23);
        const continuationIndent = `\t${" ".repeat(11)}`;
        const editors = document.querySelectorAll('[data-auto-indent="numbered-homework"]');
        const lineHeightControls = document.querySelectorAll("[data-line-height-control]");
        const lineHeightValue = document.getElementById("line-height-value");

        const normalizeLine = (line) => {
          if (!line.trim()) return "";

          const numbered = line.match(numberedLinePattern);
          if (numbered) return `${numbered[1]}${numberedLineGap}${numbered[2].trimStart()}`;

          return `${continuationIndent}${line.replace(/^\s+/, "")}`;
        };

        const normalizeValue = (value) => value.split("\n").map(normalizeLine).join("\n");

        const insertAtSelection = (editor, text) => {
          const start = editor.selectionStart;
          const end = editor.selectionEnd;

          editor.value = `${editor.value.slice(0, start)}${text}${editor.value.slice(end)}`;
          editor.setSelectionRange(start + text.length, start + text.length);
        };

        editors.forEach((editor) => {
          editor.addEventListener("keydown", (event) => {
            if (event.key === "Enter") {
              event.preventDefault();
              insertAtSelection(editor, `\n${continuationIndent}`);
            }

            if (event.key === "Tab") {
              event.preventDefault();
              insertAtSelection(editor, continuationIndent);
            }
          });

          editor.addEventListener("input", () => {
            const before = editor.value;
            const selectionStart = editor.selectionStart;
            const selectionEnd = editor.selectionEnd;
            const after = normalizeValue(before);

            if (after === before) return;

            const delta = after.length - before.length;
            editor.value = after;
            editor.setSelectionRange(Math.max(0, selectionStart + delta), Math.max(0, selectionEnd + delta));
          });
        });

        const applyLineHeight = (lineHeight) => {
          const fontSize = Math.round(lineHeight * 0.54);

          document.documentElement.style.setProperty("--line-height", `${lineHeight}px`);
          document.documentElement.style.setProperty("--editor-font-size", `${fontSize}px`);
          if (lineHeightValue) lineHeightValue.value = `${lineHeight}px`;
        };

        lineHeightControls.forEach((control) => {
          control.addEventListener("input", () => applyLineHeight(Number(control.value)));
          applyLineHeight(Number(control.value));
        });
      })();
    </script>
  </body>
</html>
