name: Scrum stale In Progress check

on:
  schedule:
    # 09:00 ICT (02:00 UTC) every day
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  issues: write
  contents: read

env:
  STALE_DAYS: "3"
  IN_PROGRESS_LABEL: "workflow:in-progress"

jobs:
  check-stale-in-progress:
    runs-on: ubuntu-latest
    steps:
      - name: Notify stale In Progress issues
        uses: actions/github-script@v7
        with:
          script: |
            const staleDays = Number(process.env.STALE_DAYS);
            const label = process.env.IN_PROGRESS_LABEL;
            const staleMs = staleDays * 24 * 60 * 60 * 1000;
            const now = Date.now();
            const marker = "<!-- scrum-stale-bot -->";
            const boardUrl = "https://github.com/users/niyata/projects/14";

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: label,
              per_page: 100,
            });

            const stale = issues.filter((issue) => {
              const updated = new Date(issue.updated_at).getTime();
              return now - updated >= staleMs;
            });

            core.summary.addHeading(`Paligo Scrum — stale In Progress (>${staleDays}d)`);
            core.summary.addRaw(`Label: \`${label}\``);

            if (stale.length === 0) {
              core.summary.addRaw("No stale items. ✅");
              return;
            }

            for (const issue of stale) {
              const days = Math.floor(
                (now - new Date(issue.updated_at).getTime()) / staleMs
              );
              core.summary.addRaw(`- [#${issue.number}](${issue.html_url}) — ${issue.title} (~${days}×${staleDays}d)`);

              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                per_page: 100,
              });
              if (comments.some((c) => c.body?.includes(marker))) continue;

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: [
                  marker,
                  "## ⏰ Scrum reminder",
                  "",
                  `Issue มี label **${label}** และไม่มี activity มากกว่า **${staleDays} วัน** (อัปเดตล่าสุด: ${issue.updated_at}).`,
                  "",
                  `Board: [Paligo — Scrum Board](${boardUrl})`,
                  "",
                  "**ตัวเลือก:**",
                  "- อัปเดตความคืบหน้า / Handoff comment",
                  "- เอา label ออก + ย้าย board กลับ **Ready**",
                  "- ปิดถ้าไม่ทำแล้ว",
                  "",
                  "_Automated by `.github/workflows/scrum-stale-check.yml`_",
                ].join("\n"),
              });
            }

            core.summary.addRaw(`\nProcessed ${stale.length} stale issue(s).`);
