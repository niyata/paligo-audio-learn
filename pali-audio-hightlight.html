<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ฝึกแปลบาลีด้วยเสียง · Paligo Audio Highlight</title>
    <style>
        :root {
            --pali-text-base: 32px;
            --pali-subtitle-base: 18px;
            --paligo-text-scale: 1;
            --page-bg: var(--paligo-page-bg, #f8f0e3);
            --pali-reader-font: "TH Sarabun Pali", "TH Sarabun Bali", Sarabun, sans-serif;
        }

        @font-face {
            font-family: "TH Sarabun Pali";
            font-style: normal;
            font-weight: 400;
            src: url("fonts/THSarabunPali.ttf") format("truetype");
        }

        @font-face {
            font-family: "TH Sarabun Pali";
            font-style: normal;
            font-weight: 700;
            src: url("fonts/THSarabunPali.ttf") format("truetype");
        }

        * { box-sizing: border-box; }

        body {
            background: var(--page-bg);
            color: var(--paligo-ink, #343434);
            font-family: Sarabun, -apple-system, BlinkMacSystemFont, "SF Pro Text", ui-sans-serif, sans-serif;
            line-height: 1.47;
            margin: 0;
            min-height: 100vh;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        .paligo-content {
            padding: 20px var(--paligo-content-padding-x, 20px) 0;
        }

        .page-shell {
            margin: 0 auto;
            max-width: var(--paligo-content-max-width, 900px);
        }

        .player-container {
            background: var(--paligo-paper-bg, #fffaf0);
            border: 1px solid var(--paligo-paper-border, rgba(74, 44, 10, 0.16));
            border-radius: 16px;
            box-shadow: 0 8px 24px var(--paligo-warm-shadow, rgba(74, 44, 10, 0.1));
            margin-bottom: 20px;
            padding: 18px 20px;
        }

        .pack-toolbar {
            align-items: center;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 12px;
        }

        .pack-toolbar select {
            border: 1px solid var(--paligo-paper-border);
            border-radius: 8px;
            flex: 1 1 260px;
            font: inherit;
            font-size: 14px;
            min-height: 40px;
            padding: 8px 10px;
        }

        .font-size-field {
            display: grid;
            flex: 1 1 180px;
            gap: 4px;
            min-width: 180px;
        }

        .font-size-field span { color: var(--paligo-muted); font-size: 13px; }
        .font-size-field input[type="range"] { width: 100%; }

        .pack-meta { color: var(--paligo-muted); font-size: 13px; margin-bottom: 8px; }
        .pack-meta a { color: #8a6d1f; }

        .status-banner {
            background: #fff8e6;
            border: 1px solid #f2d48a;
            border-radius: 10px;
            color: #6b4f00;
            font-size: 14px;
            margin: 10px 0;
            padding: 10px 12px;
        }

        .status-banner.ready {
            background: #eef8ee;
            border-color: #b8ddb8;
            color: #245824;
        }

        .pack-title {
            font-size: 1.125rem;
            font-weight: 600;
            margin: 0 0 12px;
        }

        .mode-toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }

        .corpus-toolbar {
            border-top: 1px solid var(--paligo-paper-border, rgba(74, 44, 10, 0.16));
            display: grid;
            gap: 10px;
            margin-top: 12px;
            padding-top: 12px;
        }

        .corpus-toolbar[hidden] {
            display: none;
        }

        .corpus-mode-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .corpus-item-select {
            border: 1px solid var(--paligo-paper-border);
            border-radius: 8px;
            font: inherit;
            min-height: 40px;
            padding: 8px 10px;
            width: 100%;
        }

        .corpus-navigation-row {
            align-items: center;
            display: grid;
            gap: 8px;
            grid-template-columns: auto minmax(0, 1fr) auto;
        }

        .corpus-navigation-row .btn {
            white-space: nowrap;
        }

        .btn {
            appearance: none;
            background: var(--paligo-paper-bg);
            border: 1px solid var(--paligo-paper-border);
            border-radius: 8px;
            color: var(--paligo-ink);
            cursor: pointer;
            font: inherit;
            font-size: 14px;
            min-height: 40px;
            padding: 8px 14px;
        }

        .btn.active {
            background: #fff3d6;
            border-color: #f2a600;
            color: #6b4f00;
            font-weight: 600;
        }

        .btn:disabled { cursor: not-allowed; opacity: 0.45; }

        @media (max-width: 640px) {
            .corpus-navigation-row {
                grid-template-columns: 1fr 1fr;
            }

            .corpus-item-select {
                grid-column: 1 / -1;
                grid-row: 1;
            }
        }

        .subtitle-thai {
            color: var(--paligo-muted);
            font-size: calc(var(--pali-subtitle-base) * var(--paligo-text-scale));
            min-height: 24px;
        }

        .text-display-box {
            background: #fff;
            border: 1px solid #e1dbcd;
            border-radius: 16px;
            font-family: var(--pali-reader-font);
            font-size: calc(var(--pali-text-base) * var(--paligo-text-scale));
            line-height: 2.8;
            padding: 40px;
        }

        .sentence-block {
            border-radius: 6px;
            display: inline;
            padding: 4px;
            transition: background 0.3s;
        }

        .sentence-block.current-sentence-zone { background-color: #f7f4eb; }

        .corpus-unit {
            border-bottom: 1px solid rgba(74, 44, 10, 0.1);
            margin-bottom: 22px;
            padding-bottom: 18px;
        }

        .corpus-unit:last-child {
            border-bottom: 0;
            margin-bottom: 0;
        }

        .corpus-unit__meta {
            color: var(--paligo-muted);
            font-size: calc(0.72rem * var(--paligo-text-scale));
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 8px;
        }

        .corpus-unit__title {
            color: #1f2d89;
            font-family: var(--pali-reader-font);
            font-size: calc(1.05rem * var(--paligo-text-scale));
            font-weight: 900;
            line-height: 1.4;
            margin-bottom: 10px;
        }

        .corpus-line {
            border-radius: 8px;
            display: flex;
            gap: 8px;
            line-height: 1.9;
            margin: 4px 0;
            padding: 2px 6px;
            white-space: pre-wrap;
        }

        .corpus-line__text {
            flex: 1 1 auto;
            min-width: 0;
        }

        .review-anchor {
            align-self: flex-start;
            appearance: none;
            background: #fffaf0;
            border: 1px solid rgba(31, 45, 137, 0.22);
            border-radius: 999px;
            color: #1f2d89;
            cursor: pointer;
            display: none;
            flex: 0 0 auto;
            font: inherit;
            font-size: 12px;
            font-weight: 800;
            height: 26px;
            line-height: 1;
            margin-top: 8px;
            padding: 0 8px;
        }

        body.review-mode .review-anchor {
            display: inline-flex;
            align-items: center;
        }

        .review-anchor.has-review {
            background: #fff3d6;
            border-color: #d89700;
            color: #6b4f00;
        }

        .corpus-line.current-sentence-zone {
            background: #fff3d6;
        }

        .corpus-line.corpus-page-marker {
            align-items: center;
            color: var(--paligo-muted);
            display: flex;
            font-family: Sarabun, -apple-system, BlinkMacSystemFont, "SF Pro Text", ui-sans-serif, sans-serif;
            font-size: calc(0.78rem * var(--paligo-text-scale));
            font-weight: 700;
            gap: 10px;
            line-height: 1.4;
            margin: 18px 0 8px;
            padding: 0;
        }

        .corpus-line.corpus-page-marker::before,
        .corpus-line.corpus-page-marker::after {
            border-top: 1px dashed rgba(74, 44, 10, 0.24);
            content: "";
            flex: 1 1 auto;
        }

        .pali-word {
            border-radius: 4px;
            cursor: pointer;
            display: inline-block;
            margin: 0 4px;
            padding: 0 4px;
        }

        .pali-word.active-highlight {
            background-color: #ffd166;
            color: #000;
            font-weight: bold;
        }

        .pali-word.no-timing { cursor: default; opacity: 0.92; }

        #baliAudio {
            display: none;
        }

        .review-panel {
            background: #fffaf0;
            border: 1px solid rgba(74, 44, 10, 0.16);
            border-radius: 14px;
            box-shadow: 0 10px 32px rgba(74, 44, 10, 0.16);
            display: grid;
            gap: 10px;
            max-width: 520px;
            padding: 16px;
            position: fixed;
            right: 18px;
            top: 18px;
            width: calc(100vw - 36px);
            z-index: 30;
        }

        .review-panel[hidden] {
            display: none;
        }

        .review-panel__header {
            align-items: start;
            display: flex;
            gap: 12px;
            justify-content: space-between;
        }

        .review-panel__title {
            color: #1f2d89;
            font-weight: 900;
        }

        .review-panel__target {
            color: var(--paligo-muted);
            font-size: 13px;
            line-height: 1.4;
            margin-top: 2px;
        }

        .review-panel label {
            color: var(--paligo-ink);
            display: grid;
            font-size: 14px;
            font-weight: 800;
            gap: 5px;
        }

        .review-panel select,
        .review-panel textarea {
            border: 1px solid var(--paligo-paper-border);
            border-radius: 8px;
            font: inherit;
            padding: 9px 10px;
        }

        .review-panel textarea {
            min-height: 88px;
            resize: vertical;
        }

        .review-panel__actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: flex-end;
        }

        @media (max-width: 640px) {
            .review-panel {
                bottom: 12px;
                max-width: none;
                right: 12px;
                top: auto;
                width: calc(100vw - 24px);
            }
        }
    </style>

</head>

function resolveQueryParam(name) {
    const params = new URLSearchParams(window.location.search);
    const value = params.get(name);
    if (!value) return '';
    try {
        return decodeURIComponent(value);
    } catch (_error) {
        return value;
    }
}

function joinUrl(base, relative) {
    if (!relative) return '';
    if (/^https?:\/\//.test(relative)) return relative;
    const cleanBase = base.endsWith('/') ? base.slice(0, -1) : base;
    const cleanRelative = relative.startsWith('/') ? relative.slice(1) : relative;
    return `${cleanBase}/${cleanRelative}`;
}

function dirname(path) {
    const normalized = path.replace(/\\/g, '/');
    const idx = normalized.lastIndexOf('/');
    return idx >= 0 ? normalized.slice(0, idx) : '';
}

async function fetchJson(url) {
    const response = await fetch(url);
    if (!response.ok) {
        throw new Error(`โหลด ${url} ไม่สำเร็จ (${response.status})`);
    }
    return response.json();
}

function normalizeAlignment(rawItems) {
    const items = rawItems.map((item, index) => ({
        mid_code: item.mid_code || `w${String(index + 1).padStart(3, '0')}`,
        sid: item.sid || 's1',
        pali: item.pali || '',
        thai_read: item.thai_read || '',
        start: item.start == null ? null : Number(item.start),
        end: item.end == null ? null : Number(item.end),
        s_start: item.s_start == null ? null : Number(item.s_start),
        s_end: item.s_end == null ? null : Number(item.s_end)
    }));

    const sentenceBounds = {};
    items.forEach((item) => {
        if (item.start == null || item.end == null) return;
        const bounds = sentenceBounds[item.sid] || { start: item.start, end: item.end };
        bounds.start = Math.min(bounds.start, item.start);
        bounds.end = Math.max(bounds.end, item.end);
        sentenceBounds[item.sid] = bounds;
    });

    return items.map((item) => ({
        ...item,
        s_start: item.s_start == null ? (sentenceBounds[item.sid]?.start ?? null) : item.s_start,
        s_end: item.s_end == null ? (sentenceBounds[item.sid]?.end ?? null) : item.s_end
    }));
}

function hasWordTiming(item) {
    return item.start != null && item.end != null && !Number.isNaN(item.start) && !Number.isNaN(item.end);
}

function hasSentenceTiming(item) {
    return item.s_start != null && item.s_end != null;
}

function formatTime(seconds) {
    if (!Number.isFinite(seconds) || seconds < 0) return '0:00';
    const total = Math.floor(seconds);
    const mins = Math.floor(total / 60);
    const secs = total % 60;
    return `${mins}:${String(secs).padStart(2, '0')}`;
}

function nearestSpeedIndex(rate) {
    let bestIndex = 0;
    let bestDiff = Infinity;
    SPEED_STEPS.forEach((step, index) => {
        const diff = Math.abs(step - rate);
        if (diff < bestDiff) {
            bestDiff = diff;
            bestIndex = index;
        }
    });
    return bestIndex;
}

function applyPlaybackRate() {
    const rate = SPEED_STEPS[speedIndex];
    audio.playbackRate = rate;
    speedLabel.textContent = `${rate.toFixed(rate % 1 ? 1 : 0)}×`;
    localStorage.setItem(SPEED_STORAGE_KEY, String(rate));
}

function setSpeedIndex(nextIndex) {
    speedIndex = Math.max(0, Math.min(SPEED_STEPS.length - 1, nextIndex));
    applyPlaybackRate();
}

function applyVolume() {
    const volume = Number(volumeRange.value) / 100;
    audio.volume = volume;
    localStorage.setItem(VOLUME_STORAGE_KEY, String(volumeRange.value));
}

function setPlayMode(mode) {
    playMode = mode;
    document.getElementById('btnNormal').classList.toggle('active', mode === 'normal');
    document.getElementById('btnLoop').classList.toggle('active', mode === 'loop');
    document.getElementById('btnPause').classList.toggle('active', mode === 'pause');
    footerMode.textContent = MODE_LABELS[mode] || MODE_LABELS.normal;
}

function updatePlayButton(isPlaying) {
    btnPlayPause.setAttribute('aria-label', isPlaying ? 'หยุดชั่วคราว' : 'เล่น');
    iconPlay.hidden = isPlaying;
    iconPause.hidden = !isPlaying;
}

function updateProgressUi() {
    const duration = audio.duration;
    const current = audio.currentTime;
    const hasDuration = Number.isFinite(duration) && duration > 0;

    btnPlayPause.disabled = !audio.src;
    progressRange.disabled = !hasDuration;

    if (!hasDuration) {
        timeDisplay.textContent = '0:00';
        progressRange.value = '0';
        progressRange.style.setProperty('--range-progress', '0%');
        return;
    }

    const ratio = Math.min(1, Math.max(0, current / duration));
    progressRange.value = String(Math.round(ratio * 1000));
    progressRange.style.setProperty('--range-progress', `${ratio * 100}%`);
    timeDisplay.textContent = formatTime(current);
}

function renderText() {
    if (currentCorpus) {
        renderCorpusText();
        return;
    }

    paliTextBox.innerHTML = '';
    let currentSid = null;
    let sentenceSpan = null;

    alignmentData.forEach((item) => {
        if (item.sid !== currentSid) {
            currentSid = item.sid;
            sentenceSpan = document.createElement('span');
            sentenceSpan.className = 'sentence-block';
            sentenceSpan.id = `block_${item.sid}`;
            paliTextBox.appendChild(sentenceSpan);
        }

        const wordSpan = document.createElement('span');
        wordSpan.className = 'pali-word';
        wordSpan.id = item.mid_code;
        wordSpan.textContent = item.pali;

        if (hasWordTiming(item)) {
            wordSpan.onclick = () => {
                audio.currentTime = item.start;
                audio.play().catch(() => {});
            };
        } else {
            wordSpan.classList.add('no-timing');
        }

        sentenceSpan.appendChild(wordSpan);
    });
}

function loadReviewNotes() {
    try {
        const parsed = JSON.parse(localStorage.getItem(REVIEW_STORAGE_KEY) || '[]');
        reviewNotes = Array.isArray(parsed) ? parsed : [];
    } catch (_error) {
        reviewNotes = [];
    }
}

function saveReviewNotes() {
    localStorage.setItem(REVIEW_STORAGE_KEY, JSON.stringify(reviewNotes));
}

function reviewKey(target) {
    return [
        target.corpusId || '',
        target.itemId || '',
        target.sourcePage || '',
        target.khoNo || '',
    ].join('::');
}

function findReviewNote(target) {
    const key = reviewKey(target);
    return reviewNotes.find((note) => note.key === key);
}

function formatReviewTarget(target) {
    const parts = [];
    if (target.khoLabel) parts.push(target.khoLabel);
    if (target.sourcePageLabel || target.sourcePage) parts.push(`หน้า ${target.sourcePageLabel || target.sourcePage}`);
    if (target.itemId) parts.push(target.itemId);
    return parts.join(' · ');
}

function makeReviewTarget(line) {
    return {
        corpusId: currentCorpus?.corpusId || '',
        itemId: line.itemId || '',
        parentItemId: line.parentItemId || '',
        chapterId: line.chapterId || '',
        sourcePage: line.sourcePage || '',
        sourcePageLabel: line.sourcePageLabel || '',
        khoNo: line.khoNo || '',
        khoLabel: line.khoLabel || '',
        selectedText: line.text || '',
        displayMode: corpusDisplayMode,
    };
}

function openReviewPanel(target) {
    activeReviewTarget = target;
    const existing = findReviewNote(target);
    reviewTargetLabel.textContent = formatReviewTarget(target) || 'บรรทัดที่เลือก';
    reviewCategory.value = existing?.category || 'segmentation';
    reviewComment.value = existing?.comment || '';
    reviewSuggestion.value = existing?.suggestion || '';
    reviewDeleteButton.hidden = !existing;
    reviewPanel.hidden = false;
    reviewComment.focus();
}

function closeReviewPanel() {
    reviewPanel.hidden = true;
    activeReviewTarget = null;
}

function setReviewMode(enabled) {
    reviewMode = enabled;
    document.body.classList.toggle('review-mode', enabled);
    if (reviewModeButton) {
        reviewModeButton.classList.toggle('active', enabled);
        reviewModeButton.setAttribute('aria-pressed', String(enabled));
        reviewModeButton.textContent = `โหมดรีวิว: ${enabled ? 'เปิด' : 'ปิด'}`;
    }
    if (!enabled) closeReviewPanel();
}

function getCorpusPages() {
    return (currentCorpus?.items || []).filter((item) => item.itemType === 'page');
}

function getCorpusSentences() {
    return getCorpusPages().flatMap((page) => page.children || []);
}

function getCorpusKhos() {
    return (currentCorpus?.items || []).filter((item) => item.itemType === 'kho');
}

function getCorpusChapters() {
    return currentCorpus?.chapters || [];
}

function getCurrentCorpusList() {
    if (!currentCorpus) return [];
    if (corpusDisplayMode === 'sentence') return getCorpusSentences();
    if (corpusDisplayMode === 'kho') return getCorpusKhos();
    if (corpusDisplayMode === 'chapter') return getCorpusChapters();
    return getCorpusPages();
}

function updateCorpusNavigationButtons(list = getCurrentCorpusList()) {
    const index = list.findIndex((item) => item.itemId === corpusSelectionId);
    const hasSelection = index >= 0;
    const labels = CORPUS_NAV_LABELS[corpusDisplayMode] || CORPUS_NAV_LABELS.page;
    if (corpusPrevButton) {
        corpusPrevButton.textContent = labels.prev;
        corpusPrevButton.disabled = !hasSelection || index <= 0;
    }
    if (corpusNextButton) {
        corpusNextButton.textContent = labels.next;
        corpusNextButton.disabled = !hasSelection || index >= list.length - 1;
    }
}

function setCorpusDisplayMode(mode) {
    corpusDisplayMode = mode;
    document.querySelectorAll('[data-corpus-mode]').forEach((button) => {
        const isActive = button.dataset.corpusMode === mode;
        button.classList.toggle('active', isActive);
        button.setAttribute('aria-pressed', String(isActive));
    });
    populateCorpusItemSelect();
    renderCorpusText();
}

function corpusOptionLabel(item) {
    if (!item) return '—';
    if (item.itemType === 'chapter') return `${item.title || item.chapterId}`;
    if (item.itemType === 'kho') return `${item.khoLabel || `ข้อ ${item.itemNo}`} · หน้า ${item.sourcePageLabel || item.sourcePage}`;
    if (item.itemType === 'page') return `หน้า ${item.sourcePageLabel || item.sourcePage || item.itemNo} · ${item.title || item.itemId}`;
    if (item.itemType === 'sentence') return `หน้า ${item.sourcePageLabel || item.sourcePage} · บรรทัด ${item.itemNo}`;
    return item.title || item.itemId;
}

function populateCorpusItemSelect() {
    if (!corpusItemSelect || !currentCorpus) return;
    const list = getCurrentCorpusList();

    corpusItemSelect.innerHTML = '';
    list.forEach((item) => {
        const option = document.createElement('option');
        option.value = item.itemId;
        option.textContent = corpusOptionLabel(item);
        corpusItemSelect.appendChild(option);
    });
    if (!corpusSelectionId || !list.some((item) => item.itemId === corpusSelectionId)) {
        corpusSelectionId = list[0]?.itemId || '';
    }
    corpusItemSelect.value = corpusSelectionId;
    updateCorpusNavigationButtons(list);
}

function navigateCorpusSelection(direction) {
    const list = getCurrentCorpusList();
    if (!list.length) return;
    const currentIndex = list.findIndex((item) => item.itemId === corpusSelectionId);
    const fallbackIndex = direction > 0 ? -1 : list.length;
    const nextIndex = Math.min(list.length - 1, Math.max(0, (currentIndex >= 0 ? currentIndex : fallbackIndex) + direction));
    corpusSelectionId = list[nextIndex].itemId;
    if (corpusItemSelect) corpusItemSelect.value = corpusSelectionId;
    updateCorpusNavigationButtons(list);
    renderCorpusText();
}

function makeCorpusLine(lineData, className = '') {
    const line = document.createElement('span');
    line.className = `corpus-line${className ? ` ${className}` : ''}`;
    const text = typeof lineData === 'string' ? lineData : lineData?.text;
    const textSpan = document.createElement('span');
    textSpan.className = 'corpus-line__text';
    textSpan.textContent = text || '—';
    line.append(textSpan);

    if (currentCorpus && typeof lineData === 'object' && !lineData.skipReview) {
        const target = makeReviewTarget(lineData);
        const button = document.createElement('button');
        button.className = 'review-anchor';
        if (findReviewNote(target)) button.classList.add('has-review');
        button.type = 'button';
        button.textContent = 'รีวิว';
        button.setAttribute('aria-label', 'สลักความเห็นรีวิวบรรทัดนี้');
        button.addEventListener('click', () => openReviewPanel(target));
        line.append(button);
    }
    return line;
}

function renderCorpusUnit({ title, meta, lines, activeItemId }) {
    const section = document.createElement('section');
    section.className = 'corpus-unit';
    if (meta) {
        const metaEl = document.createElement('div');
        metaEl.className = 'corpus-unit__meta';
        metaEl.textContent = meta;
        section.append(metaEl);
    }
    if (title) {
        const titleEl = document.createElement('div');
        titleEl.className = 'corpus-unit__title';
        titleEl.textContent = title;
        section.append(titleEl);
    }
    lines.forEach((line) => {
        const classes = [
            line.className || '',
            line.itemId === activeItemId ? 'current-sentence-zone' : '',
        ].filter(Boolean).join(' ');
        section.append(makeCorpusLine(line, classes));
    });
    return section;
}

function buildKhoDisplayLines(item) {
    const displayLines = [];
    let lastPage = item.sourcePage;
    (item.lines || []).forEach((line, index) => {
        const isNewPage = line.sourcePage && line.sourcePage !== lastPage;
        if (isNewPage) {
            displayLines.push({
                itemId: `${item.itemId}-page-${line.sourcePage}`,
                text: `${item.khoLabel || item.title || 'ข้อ'} ต่อหน้า ${line.sourcePageLabel || line.sourcePage}`,
                className: 'corpus-page-marker',
                skipReview: true,
            });
            lastPage = line.sourcePage;
        }
        displayLines.push({
            itemId: `${item.itemId}-line-${index + 1}`,
            parentItemId: item.itemId,
            chapterId: item.chapterId,
            sourcePage: line.sourcePage,
            sourcePageLabel: line.sourcePageLabel,
            khoNo: item.khoNo,
            khoLabel: item.khoLabel,
            text: line.text,
        });
    });
    return displayLines;
}

function renderCorpusText() {
    paliTextBox.innerHTML = '';
    if (!currentCorpus) return;

    if (corpusDisplayMode === 'sentence') {
        const item = getCorpusSentences().find((sentence) => sentence.itemId === corpusSelectionId);
        if (!item) return;
        paliTextBox.append(
            renderCorpusUnit({
                title: item.pali,
                meta: `itemId: ${item.itemId} · chapterId: ${item.chapterId} · หน้า ${item.sourcePageLabel || item.sourcePage}`,
                lines: [{
                    itemId: item.itemId,
                    parentItemId: item.parentItemId,
                    chapterId: item.chapterId,
                    sourcePage: item.sourcePage,
                    sourcePageLabel: item.sourcePageLabel,
                    text: item.pali,
                }],
                activeItemId: item.itemId,
            })
        );
        thaiSubtitle.textContent = item.thaiRead || item.thaiLiteral || item.thaiMeaning || 'ยังไม่มีเสียง/คำแปลไทยที่ align กับบรรทัดนี้';
        return;
    }

    if (corpusDisplayMode === 'kho') {
        const item = getCorpusKhos().find((kho) => kho.itemId === corpusSelectionId);
        if (!item) return;
        paliTextBox.append(
            renderCorpusUnit({
                title: item.title,
                meta: `itemId: ${item.itemId} · chapterId: ${item.chapterId} · เริ่มหน้า ${item.sourcePageLabel || item.sourcePage}`,
                lines: buildKhoDisplayLines(item),
            })
        );
        thaiSubtitle.textContent = `${item.khoLabel || item.title} · ${item.lines?.length || 0} บรรทัด`;
        return;
    }

    if (corpusDisplayMode === 'chapter') {
        const chapter = getCorpusChapters().find((item) => item.itemId === corpusSelectionId);
        if (!chapter) return;
        const pages = getCorpusPages().filter((page) => page.chapterId === chapter.chapterId);
        pages.forEach((page) => {
            paliTextBox.append(
                renderCorpusUnit({
                    title: page.title,
                    meta: `chapterId: ${page.chapterId} · itemId: ${page.itemId}`,
                    lines: (page.children || []).map((sentence) => ({
                        itemId: sentence.itemId,
                        parentItemId: sentence.parentItemId,
                        chapterId: sentence.chapterId,
                        sourcePage: sentence.sourcePage,
                        sourcePageLabel: sentence.sourcePageLabel,
                        text: sentence.pali,
                    })),
                })
            );
        });
        thaiSubtitle.textContent = `${chapter.title} · ${pages.length} หน้า`;
        return;
    }

    const page = getCorpusPages().find((item) => item.itemId === corpusSelectionId);
    if (!page) return;
    paliTextBox.append(
        renderCorpusUnit({
            title: page.title,
            meta: `itemId: ${page.itemId} · chapterId: ${page.chapterId}`,
            lines: (page.children || []).map((sentence) => ({
                itemId: sentence.itemId,
                parentItemId: sentence.parentItemId,
                chapterId: sentence.chapterId,
                sourcePage: sentence.sourcePage,
                sourcePageLabel: sentence.sourcePageLabel,
                text: sentence.pali,
            })),
        })
    );
    thaiSubtitle.textContent = `หน้า ${page.sourcePageLabel || page.sourcePage} · ${page.children?.length || 0} บรรทัด`;
}

function updateStatusBanner(pack) {
    const timedCount = alignmentData.filter(hasWordTiming).length;
    const totalCount = alignmentData.length;
    const ready = pack.alignmentStatus === 'ready' || timedCount === totalCount;

    statusBanner.classList.toggle('ready', ready);
    if (ready) {
        statusBanner.textContent = `พร้อมไฮไลท์อัตโนมัติ (${timedCount}/${totalCount} คำมีเวลา)`;
        return;
    }

    statusBanner.textContent = `โหมด tokens-only: แสดงข้อความแล้ว แต่ยังไม่มีเวลา alignment (${timedCount}/${totalCount} คำ) — ใส่ไฟล์ MP3 ที่ ${pack.audio || 'practice/*.mp3'} และเติม start/end ใน JSON`;
}

function updatePackMeta(pack) {
    const links = [];
    if (pack.pageHtml && bookBaseUrl) {
        links.push(`<a href="book-page-viewer.html?manifest=${encodeURIComponent(resolveQueryParam('manifest') || '')}&page=${pack.page || 1}" target="_blank" rel="noopener">ดูหน้าเล่ม</a>`);
    }
    if (pack.answerPage) {
        links.push(`เฉลยหน้า ${pack.answerPage}`);
    }
    packMeta.innerHTML = links.length ? links.join(' · ') : '';
}

async function loadAudioForPack(pack) {
    if (!pack.audio) {
        audio.removeAttribute('src');
        audio.load();
        updateProgressUi();
        updatePlayButton(false);
        return;
    }
    const audioUrl = joinUrl(packBaseUrl, pack.audio);
    audio.src = audioUrl;
    audio.load();
    applyPlaybackRate();
    applyVolume();
}

async function applyPack(pack, baseUrl) {
    currentCorpus = null;
    corpusToolbar.hidden = true;
    setReviewMode(false);
    currentPack = pack;
    packBaseUrl = baseUrl;
    bookBaseUrl = dirname(resolveQueryParam('manifest') || baseUrl);
    alignmentData = normalizeAlignment(pack.alignment || []);
    const title = pack.title || 'ฝึกแปลบาลีด้วยเสียง';
    packTitle.textContent = title;
    footerTitle.textContent = title;
    updatePackMeta(pack);
    updateStatusBanner(pack);
    renderText();
    await loadAudioForPack(pack);
}

async function loadCorpusManifest(manifestPath) {
    const manifest = await fetchJson(manifestPath);
    corpusBaseUrl = dirname(manifestPath);
    const corpusPath = joinUrl(corpusBaseUrl, manifest.corpus || 'corpus.json');
    currentCorpus = await fetchJson(corpusPath);
    currentPack = null;
    alignmentData = [];
    packBaseUrl = corpusBaseUrl;
    corpusDisplayMode = manifest.defaultDisplayMode || 'page';
    corpusSelectionId = '';

    packSelect.innerHTML = '';
    const option = document.createElement('option');
    option.value = manifestPath;
    option.textContent = manifest.title || currentCorpus.title || 'ตำราเรียน';
    option.selected = true;
    packSelect.appendChild(option);
    packSelect.disabled = true;
    corpusToolbar.hidden = false;
    audio.removeAttribute('src');
    audio.load();
    updateProgressUi();
    updatePlayButton(false);

    const title = manifest.title || currentCorpus.title || 'ตำราเรียน';
    packTitle.textContent = title;
    footerTitle.textContent = title;
    footerMode.textContent = 'โหมดอ่านตำรา';
    statusBanner.classList.add('ready');
    const khoCount = getCorpusKhos().length;
    statusBanner.textContent = khoCount
        ? `โหลด corpus แล้ว (${getCorpusPages().length} หน้า · ${khoCount} ข้อ · ${getCorpusSentences().length} บรรทัด)`
        : `โหลด corpus แล้ว (${getCorpusPages().length} หน้า · ${getCorpusSentences().length} บรรทัด)`;
    packMeta.textContent = `${currentCorpus.grade || ''} · ${currentCorpus.sourceType || 'corpus'}`;
    setCorpusDisplayMode(corpusDisplayMode);
}

function populatePackSelect(packs, selectedFile) {
    packSelect.innerHTML = '';
    packs.forEach((entry) => {
        const option = document.createElement('option');
        option.value = entry.file;
        option.textContent = `${entry.title} (${entry.tokenCount || '?'} คำ)`;
        if (entry.file === selectedFile) option.selected = true;
        packSelect.appendChild(option);
    });
    packSelect.disabled = packs.length <= 1;
}

async function loadPackFromManifest(manifestPath, packFile) {
    const manifest = await fetchJson(manifestPath);
    bookBaseUrl = dirname(manifestPath);
    const indexPath = joinUrl(bookBaseUrl, manifest.practiceIndex || 'practice/index.json');
    const index = await fetchJson(indexPath);
    const packs = index.packs || [];
    if (!packs.length) {
        throw new Error('ไม่พบ practice pack ใน manifest');
    }

    const selected = packFile || resolveQueryParam('pack') || packs[0].file;
    populatePackSelect(packs, selected);
    const packPath = joinUrl(bookBaseUrl, selected);
    const pack = await fetchJson(packPath);
    await applyPack(pack, bookBaseUrl);
}

async function loadDirectPack(packPath) {
    const pack = await fetchJson(packPath);
    packSelect.innerHTML = '';
    const option = document.createElement('option');
    option.value = packPath;
    option.textContent = pack.title || packPath;
    option.selected = true;
    packSelect.appendChild(option);
    packSelect.disabled = true;
    await applyPack(pack, dirname(packPath));
}

async function bootstrap() {
    const manifestPath = resolveQueryParam('manifest');
    const packPath = resolveQueryParam('pack');
    const corpusPath = resolveQueryParam('corpus');

    try {
        if (corpusPath) {
            await loadCorpusManifest(corpusPath);
            return;
        }
        if (manifestPath) {
            await loadPackFromManifest(manifestPath, packPath);
            return;
        }
        if (packPath) {
            await loadDirectPack(packPath);
            return;
        }
        await applyPack(DEMO_PACK, '.');
    } catch (error) {
        statusBanner.classList.remove('ready');
        statusBanner.textContent = `${error.message} — ใช้ตัวอย่าง chakkhupala แทน`;
        await applyPack(DEMO_PACK, '.');
    }
}

function applyTextScale(scale) {
    document.documentElement.style.setProperty('--paligo-text-scale', String(scale / 100));
}

function bindReaderScale(input, valueEl) {
    const storageKey = 'paligo-pali-reader-scale-v1';
    const min = 100;
    const max = 240;
    const defaultScale = 125;
    const clamp = (value) => {
        const scale = Number(value);
        if (!Number.isFinite(scale)) return defaultScale;
        return Math.min(max, Math.max(min, Math.round(scale)));
    };
    const stored = clamp(localStorage.getItem(storageKey) || defaultScale);

    input.min = String(min);
    input.max = String(max);
    input.step = '5';
    input.value = String(stored);

    const apply = (value) => {
        const next = clamp(value);
        input.value = String(next);
        if (valueEl) valueEl.textContent = `${next}%`;
        localStorage.setItem(storageKey, String(next));
        applyTextScale(next);
    };

    input.addEventListener('input', () => apply(input.value));
    apply(stored);
}

document.getElementById('btnNormal').addEventListener('click', () => setPlayMode('normal'));
document.getElementById('btnLoop').addEventListener('click', () => setPlayMode('loop'));
document.getElementById('btnPause').addEventListener('click', () => setPlayMode('pause'));

packSelect.addEventListener('change', async () => {
    const manifestPath = resolveQueryParam('manifest');
    if (!manifestPath) return;
    const url = new URL(window.location.href);
    url.searchParams.set('pack', packSelect.value);
    window.history.replaceState({}, '', url);
    const pack = await fetchJson(joinUrl(bookBaseUrl, packSelect.value));
    await applyPack(pack, bookBaseUrl);
});

document.querySelectorAll('[data-corpus-mode]').forEach((button) => {
    button.addEventListener('click', () => setCorpusDisplayMode(button.dataset.corpusMode));
});

corpusItemSelect.addEventListener('change', () => {
    corpusSelectionId = corpusItemSelect.value;
    updateCorpusNavigationButtons();
    renderCorpusText();
});

corpusPrevButton?.addEventListener('click', () => navigateCorpusSelection(-1));
corpusNextButton?.addEventListener('click', () => navigateCorpusSelection(1));

reviewModeButton?.addEventListener('click', () => setReviewMode(!reviewMode));
reviewCloseButton?.addEventListener('click', closeReviewPanel);
reviewDeleteButton?.addEventListener('click', () => {
    if (!activeReviewTarget) return;
    const key = reviewKey(activeReviewTarget);
    reviewNotes = reviewNotes.filter((note) => note.key !== key);
    saveReviewNotes();
    closeReviewPanel();
    renderCorpusText();
});

reviewPanel?.addEventListener('submit', (event) => {
    event.preventDefault();
    if (!activeReviewTarget) return;
    const key = reviewKey(activeReviewTarget);
    const nextNote = {
        key,
        target: activeReviewTarget,
        category: reviewCategory.value,
        comment: reviewComment.value.trim(),
        suggestion: reviewSuggestion.value.trim(),
        status: 'open',
        updatedAt: new Date().toISOString(),
    };
    const existingIndex = reviewNotes.findIndex((note) => note.key === key);
    if (existingIndex >= 0) {
        reviewNotes[existingIndex] = {
            ...reviewNotes[existingIndex],
            ...nextNote,
            createdAt: reviewNotes[existingIndex].createdAt || nextNote.updatedAt,
        };
    } else {
        reviewNotes.push({
            ...nextNote,
            createdAt: nextNote.updatedAt,
        });
    }
    saveReviewNotes();
    closeReviewPanel();
    renderCorpusText();
});

document.getElementById('btnReload').addEventListener('click', () => bootstrap());

bindReaderScale(
    document.getElementById('fontScaleInput'),
    document.getElementById('fontScaleValue')
);

btnPlayPause.addEventListener('click', () => {
    if (!audio.src) return;
    if (audio.paused) {
        audio.play().catch(() => {});
    } else {
        audio.pause();
    }
});

progressRange.addEventListener('input', () => {
    if (!Number.isFinite(audio.duration) || audio.duration <= 0) return;
    isSeeking = true;
    const ratio = Number(progressRange.value) / 1000;
    progressRange.style.setProperty('--range-progress', `${ratio * 100}%`);
    timeDisplay.textContent = formatTime(ratio * audio.duration);
});

progressRange.addEventListener('change', () => {
    if (!Number.isFinite(audio.duration) || audio.duration <= 0) return;
    const ratio = Number(progressRange.value) / 1000;
    audio.currentTime = ratio * audio.duration;
    isSeeking = false;
    updateProgressUi();
});

document.getElementById('btnSpeedDown').addEventListener('click', () => setSpeedIndex(speedIndex - 1));
document.getElementById('btnSpeedUp').addEventListener('click', () => setSpeedIndex(speedIndex + 1));
speedLabel.addEventListener('click', () => setSpeedIndex((speedIndex + 1) % SPEED_STEPS.length));

volumeRange.addEventListener('input', applyVolume);

audio.addEventListener('loadedmetadata', updateProgressUi);
audio.addEventListener('play', () => updatePlayButton(true));
audio.addEventListener('pause', () => updatePlayButton(false));
audio.addEventListener('ended', () => updatePlayButton(false));

audio.addEventListener('timeupdate', () => {
    if (!isSeeking) {
        updateProgressUi();
    }

    if (!alignmentData.some(hasWordTiming)) return;

    const currentTime = audio.currentTime;
    let activeWord = null;

    alignmentData.forEach((item) => {
        const wordEl = document.getElementById(item.mid_code);
        const blockEl = document.getElementById(`block_${item.sid}`);
        if (!wordEl || !blockEl) return;

        if (hasWordTiming(item) && currentTime >= item.start && currentTime <= item.end) {
            wordEl.classList.add('active-highlight');
            blockEl.classList.add('current-sentence-zone');
            if (item.thai_read) {
                document.getElementById('thaiSubtitle').textContent = `คำแปล: ${item.thai_read}`;
            }
            activeWord = item;
        } else {
            wordEl.classList.remove('active-highlight');
            if (!hasSentenceTiming(item) || currentTime < item.s_start || currentTime > item.s_end) {
                blockEl.classList.remove('current-sentence-zone');
            }
        }
    });

    if (!activeWord || !hasSentenceTiming(activeWord)) return;

    if (currentTime >= activeWord.s_end - 0.1) {
        if (playMode === 'loop') {
            audio.currentTime = activeWord.s_start;
            audio.play().catch(() => {});
        } else if (playMode === 'pause') {
            audio.pause();
            audio.currentTime = activeWord.s_end;
            setPlayMode('normal');
        }
    }
});

const storedRate = Number(localStorage.getItem(SPEED_STORAGE_KEY));
if (Number.isFinite(storedRate)) {
    speedIndex = nearestSpeedIndex(storedRate);
}
applyPlaybackRate();

const storedVolume = Number(localStorage.getItem(VOLUME_STORAGE_KEY));
if (Number.isFinite(storedVolume)) {
    volumeRange.value = String(Math.max(0, Math.min(100, storedVolume)));
}
applyVolume();
setPlayMode('normal');
loadReviewNotes();
bootstrap();
</script>
</body>
</html>
