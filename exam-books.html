<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>สมุดข้อสอบ</title>
    <style>
      :root {
        --page-bg: #f8f0e3;
        --paper-bg: #fffaf0;
        --card-bg: rgba(255, 255, 255, 0.84);
        --card-border: rgba(74, 44, 10, 0.16);
        --exam-blue: rgba(31, 45, 137, 0.76);
        --ink: #333;
        --muted: rgba(51, 51, 51, 0.62);
      }

      * {
        box-sizing: border-box;
      }

      body {
        background: var(--page-bg);
        color: var(--ink);
        font-family: Sarabun, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        line-height: 1.5;
        margin: 0;
        min-height: 100vh;
        padding: clamp(18px, 4vw, 42px);
      }

      .books-shell {
        display: grid;
        gap: 16px;
        margin: 0 auto;
        max-width: 1120px;
      }

      .books-header,
      .book-card,
      .empty-state {
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        border-radius: 8px;
        box-shadow: 0 18px 46px rgba(74, 44, 10, 0.1);
      }

      .books-header {
        align-items: end;
        display: grid;
        gap: 12px;
        grid-template-columns: minmax(0, 1fr) auto;
        padding: 18px;
      }

      .books-title {
        color: var(--exam-blue);
        font-size: clamp(1.45rem, 3vw, 2.1rem);
        line-height: 1.15;
        margin: 0;
      }

      .books-subtitle {
        color: var(--muted);
        font-size: 0.92rem;
        font-weight: 700;
        margin: 4px 0 0;
      }

      .button-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: flex-end;
      }

      .button {
        appearance: none;
        background: var(--paper-bg);
        border: 1px solid rgba(31, 45, 137, 0.24);
        border-radius: 6px;
        color: var(--exam-blue);
        cursor: pointer;
        display: inline-flex;
        font: inherit;
        font-size: 0.86rem;
        font-weight: 900;
        min-height: 36px;
        padding: 7px 10px;
        text-decoration: none;
      }

      .button.is-primary {
        background: var(--exam-blue);
        color: var(--paper-bg);
      }

      .book-grid {
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      }

      .book-card {
        display: grid;
        gap: 10px;
        padding: 14px;
      }

      .book-title {
        color: var(--exam-blue);
        font-size: 1.05rem;
        font-weight: 900;
        line-height: 1.25;
        margin: 0;
      }

      .book-meta {
        color: var(--muted);
        font-size: 0.82rem;
        font-weight: 700;
      }

      .book-status {
        background: rgba(31, 45, 137, 0.08);
        border-radius: 999px;
        color: var(--exam-blue);
        display: inline-flex;
        font-size: 0.78rem;
        font-weight: 900;
        justify-self: start;
        padding: 3px 9px;
      }

      .empty-state {
        color: var(--muted);
        display: grid;
        gap: 8px;
        justify-items: center;
        padding: 42px 18px;
        text-align: center;
      }

      .import-input {
        display: none;
      }

      @media (max-width: 720px) {
        .books-header {
          grid-template-columns: 1fr;
        }

        .button-row {
          justify-content: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <main class="books-shell">
      <header class="books-header">
        <div>
          <h1 class="books-title">สมุดข้อสอบ</h1>
          <p class="books-subtitle" data-summary>สมุดคำตอบ ๑ รอบสอบ = ๑ เล่ม แยกข้อมูลไม่ให้ทับกัน</p>
        </div>
        <div class="button-row">
          <a class="button is-primary" href="ruled-lines-card-only-template.html?newBook=1">สร้างสมุดใหม่</a>
          <button class="button" type="button" data-export-all>ส่งออกทั้งหมด</button>
          <label class="button">
            นำเข้า
            <input class="import-input" type="file" accept="application/json,.json,.paligo-book,.paligo-backup" data-import-file />
          </label>
        </div>
      </header>
      <section class="book-grid" data-book-grid></section>
      <section class="empty-state" data-empty-state hidden>
        <strong>ยังไม่มีสมุดข้อสอบ</strong>
        <span>กดสร้างสมุดใหม่เพื่อเริ่มทำข้อสอบรอบแรก</span>
      </section>
    </main>

    <script>
      (() => {
        const booksStorageKey = "paligo-exam-answer-books-v1";
        const activeBookStorageKey = "paligo-exam-active-book-id-v1";
        const ownerStorageKey = "paligo-exam-local-owner-id-v1";
        const grid = document.querySelector("[data-book-grid]");
        const emptyState = document.querySelector("[data-empty-state]");
        const summary = document.querySelector("[data-summary]");
        const importFile = document.querySelector("[data-import-file]");
        const thaiDigits = new Map([
          ["0", "๐"], ["1", "๑"], ["2", "๒"], ["3", "๓"], ["4", "๔"],
          ["5", "๕"], ["6", "๖"], ["7", "๗"], ["8", "๘"], ["9", "๙"],
        ]);

        const toThaiNumber = (value) => String(value).replace(/[0-9]/g, (digit) => thaiDigits.get(digit));
        const getBooks = () => {
          try {
            const parsed = JSON.parse(localStorage.getItem(booksStorageKey) || "[]");
            return Array.isArray(parsed) ? parsed : [];
          } catch {
            return [];
          }
        };
        const setBooks = (books) => localStorage.setItem(booksStorageKey, JSON.stringify(books));
        const getOwnerId = () => localStorage.getItem(ownerStorageKey) || "";
        const downloadJson = (fileName, payload) => {
          const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
          const url = URL.createObjectURL(blob);
          const link = document.createElement("a");
          link.href = url;
          link.download = fileName;
          document.body.append(link);
          link.click();
          link.remove();
          URL.revokeObjectURL(url);
        };
        const formatDate = (value) => {
          const date = new Date(value || Date.now());
          return date.toLocaleString("th-TH", {
            day: "numeric",
            month: "short",
            year: "numeric",
            hour: "2-digit",
            minute: "2-digit",
          });
        };
        const renderBooks = () => {
          const books = getBooks().sort((a, b) => new Date(b.updatedAt || 0) - new Date(a.updatedAt || 0));
          grid.innerHTML = "";
          emptyState.hidden = books.length > 0;
          summary.textContent = `มีสมุดข้อสอบ ${toThaiNumber(books.length)} เล่ม · พร้อมส่งออกเพื่อย้ายเครื่อง`;

          books.forEach((book) => {
            const article = document.createElement("article");
            const title = document.createElement("h2");
            const meta = document.createElement("div");
            const status = document.createElement("span");
            const actions = document.createElement("div");
            const open = document.createElement("a");
            const exportBook = document.createElement("button");

            article.className = "book-card";
            title.className = "book-title";
            meta.className = "book-meta";
            status.className = "book-status";
            actions.className = "button-row";
            open.className = "button is-primary";
            exportBook.className = "button";
            exportBook.type = "button";

            title.textContent = book.title || "สมุดคำตอบ";
            meta.textContent = `${book.studentName || "ไม่ระบุชื่อ"} · ป.ธ. ${toThaiNumber(book.grade || "-")} · แก้ไข ${formatDate(book.updatedAt)}`;
            status.textContent = book.status === "submitted" ? "ส่งตรวจแล้ว" : "ฉบับร่าง";
            open.href = `ruled-lines-card-only-template.html?bookId=${encodeURIComponent(book.id)}`;
            open.textContent = "เปิดเล่ม";
            exportBook.textContent = "ส่งออกเล่มนี้";
            exportBook.addEventListener("click", () => {
              downloadJson(`${book.id}.paligo-book.json`, {
                schema: "paligo.exam.answerBookExport.v1",
                exportedAt: new Date().toISOString(),
                ownerId: getOwnerId(),
                book,
              });
            });

            actions.append(open, exportBook);
            article.append(title, meta, status, actions);
            grid.append(article);
          });
        };
        const importPayload = (payload) => {
          const books = getBooks();
          const incoming = [];

          if (payload?.schema === "paligo.exam.answerBookExport.v1" && payload.book) incoming.push(payload.book);
          if (payload?.schema === "paligo.exam.answerBooksBackup.v1" && Array.isArray(payload.books)) incoming.push(...payload.books);

          if (!incoming.length) {
            window.alert("ไฟล์นี้ไม่ใช่ไฟล์สมุดข้อสอบที่รองรับ");
            return;
          }

          const merged = books.filter((book) => !incoming.some((item) => item.id === book.id));
          merged.push(...incoming);
          setBooks(merged);
          renderBooks();
          window.alert("นำเข้าสมุดข้อสอบแล้ว");
        };

        document.querySelector("[data-export-all]")?.addEventListener("click", () => {
          downloadJson("paligo-exam-books-backup.paligo-backup.json", {
            schema: "paligo.exam.answerBooksBackup.v1",
            exportedAt: new Date().toISOString(),
            ownerId: getOwnerId(),
            books: getBooks(),
          });
        });
        importFile?.addEventListener("change", async () => {
          const file = importFile.files?.[0];
          if (!file) return;

          try {
            importPayload(JSON.parse(await file.text()));
          } catch {
            window.alert("อ่านไฟล์ไม่ได้ กรุณาตรวจสอบไฟล์อีกครั้ง");
          } finally {
            importFile.value = "";
          }
        });
        window.addEventListener("pageshow", renderBooks);
        renderBooks();
      })();
    </script>
  </body>
</html>
